<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>BOX FIGHT</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%23070810'/><rect x='6' y='6' width='20' height='20' rx='2' fill='none' stroke='%233b82f6' stroke-width='3'/></svg>">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap');

/* ── tokens ── */
:root {
  --bg:       #07080f;
  --surface:  #0c101a;
  --border:   #131924;
  --blue:     #3b82f6;
  --blue-dim: rgba(59,130,246,0.12);
  --text:     #e8edf5;
  --muted:    #2d3a4d;
  --ghost:    #141c28;
}

* { margin:0; padding:0; box-sizing:border-box; }
body {
  background:var(--bg); font-family:'Inter',system-ui,sans-serif;
  display:flex; align-items:center; justify-content:center;
  min-height:100vh; user-select:none; overflow:hidden;
}
#wrap { position:relative; }
canvas { display:block; cursor:none; border:1px solid var(--ghost); }

/* ── overlay ── */
.overlay {
  position:absolute; top:0; left:0; width:100%; height:100%;
  background:rgba(7,8,15,0.94);
  display:none; align-items:center; justify-content:center;
}
.overlay.show { display:flex; }

/* ════════════════════════════════════
   MAIN MENU — two-column layout
   ════════════════════════════════════ */
.menu-layout {
  display:flex; gap:100px; align-items:center;
  padding:0 80px; width:100%;
}
.menu-left { flex:1; display:flex; flex-direction:column; gap:20px; }
.menu-logo {
  font-size:80px; font-weight:900; line-height:0.88;
  color:#fff; letter-spacing:2px;
  text-shadow:0 0 80px rgba(59,130,246,0.35);
}
.menu-tag { font-size:11px; color:var(--muted); letter-spacing:5px; font-weight:400; }
.menu-diff-group { display:flex; flex-direction:column; gap:8px; margin-top:8px; }
.diff-label { font-size:9px; color:var(--ghost); letter-spacing:4px; font-weight:700; }
.diff-pills { display:flex; gap:6px; }
.diff-btn {
  padding:5px 16px; font-size:10px; font-weight:700; letter-spacing:2px;
  cursor:pointer; background:transparent; color:var(--ghost);
  border:1px solid var(--ghost); border-radius:999px; transition:all 0.15s;
}
.diff-btn.sel { background:var(--blue-dim); color:var(--blue); border-color:var(--blue); }
.diff-btn:hover:not(.sel) { color:var(--muted); border-color:var(--muted); }

.menu-right { display:flex; flex-direction:column; gap:4px; min-width:300px; }
.nav-btn {
  display:flex; align-items:center; justify-content:space-between;
  padding:15px 20px; width:100%;
  font-size:12px; font-weight:700; letter-spacing:3px; font-family:'Inter',sans-serif;
  cursor:pointer; background:transparent; color:var(--muted);
  border:1px solid transparent; border-radius:8px;
  transition:all 0.15s; text-align:left;
}
.nav-btn .arr { opacity:0; transform:translateX(-6px); transition:all 0.15s; font-size:16px; font-weight:300; }
.nav-btn:hover { background:var(--surface); color:var(--text); border-color:var(--border); }
.nav-btn:hover .arr { opacity:1; transform:translateX(0); }
.nav-online { color:var(--blue) !important; }
.nav-online:hover { background:var(--blue-dim) !important; border-color:var(--blue) !important; }
.nav-sep { height:1px; background:var(--border); margin:6px 0; }
.nav-sub { font-size:10px; color:var(--ghost) !important; letter-spacing:2px; }
.nav-sub:hover { color:var(--muted) !important; }

/* ── shared buttons ── */
.sm-btn {
  padding:9px 22px; font-size:11px; font-weight:600; letter-spacing:2px;
  cursor:pointer; background:transparent; color:var(--muted);
  border:1px solid var(--border); border-radius:6px; transition:all 0.14s;
}
.sm-btn:hover { color:var(--text); border-color:var(--muted); }
.btn-row { display:flex; gap:10px; }

.prim-btn {
  padding:13px 0; width:100%; font-size:12px; font-weight:700; letter-spacing:3px;
  cursor:pointer; background:var(--blue); color:#fff; border:none; border-radius:8px;
  transition:all 0.15s; font-family:'Inter',sans-serif;
}
.prim-btn:hover { background:#5b95ff; box-shadow:0 6px 24px rgba(59,130,246,0.3); }
.prim-btn:active { transform:scale(0.98); }

/* ── result / pause ── */
#resultText { font-size:52px; font-weight:900; letter-spacing:6px; text-shadow:0 0 40px currentColor; }
#resultSub  { font-size:11px; color:var(--muted); letter-spacing:3px; }
.pause-title { font-size:52px; font-weight:900; letter-spacing:10px; color:var(--text); }
.pause-sub   { font-size:10px; color:var(--ghost); letter-spacing:4px; margin-top:-4px; }

/* ═══════════════════════
   CARDS
   ═══════════════════════ */
.card {
  background:var(--surface); border:1px solid var(--border); border-radius:14px;
  padding:36px 36px; display:flex; flex-direction:column; gap:14px;
  box-shadow:0 24px 64px rgba(0,0,0,0.5);
}
.auth-box, .lobby-box, .in-lobby-box { width:400px; }
.auth-box, .lobby-box, .in-lobby-box,
.settings-box { background:var(--surface); border:1px solid var(--border); border-radius:14px; padding:36px; display:flex; flex-direction:column; gap:14px; box-shadow:0 24px 64px rgba(0,0,0,0.5); }
.auth-box, .lobby-box, .in-lobby-box { width:400px; }

/* auth */
.auth-title { font-size:20px; font-weight:900; letter-spacing:6px; color:var(--text); text-align:center; }
.auth-sub   { font-size:11px; color:var(--muted); text-align:center; letter-spacing:1px; }
.auth-tabs  { display:flex; background:var(--bg); border:1px solid var(--border); border-radius:8px; overflow:hidden; }
.auth-tab {
  flex:1; padding:9px 0; font-size:11px; font-weight:700; letter-spacing:2px;
  cursor:pointer; background:transparent; color:var(--ghost); border:none; transition:all 0.14s;
}
.auth-tab.sel { background:var(--blue-dim); color:var(--blue); }
.auth-tab:hover:not(.sel) { color:var(--muted); }
.field {
  padding:12px 14px; font-size:13px; font-weight:400;
  background:var(--bg); color:var(--text);
  border:1px solid var(--border); border-radius:8px; outline:none;
  font-family:'Inter',sans-serif; transition:border-color 0.15s, box-shadow 0.15s;
}
.field:focus { border-color:var(--blue); box-shadow:0 0 0 3px var(--blue-dim); }
.field::placeholder { color:var(--ghost); }
.err-msg { font-size:11px; color:#f87171; text-align:center; min-height:16px; }
.ok-msg  { font-size:11px; color:#4ade80; text-align:center; min-height:16px; }
.link-btn { font-size:11px; color:var(--muted); text-align:center; cursor:pointer; letter-spacing:1px; background:none; border:none; font-family:inherit; transition:color 0.14s; }
.link-btn:hover { color:var(--text); }

/* lobby hub */
.lobby-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:2px; }
.lobby-eyebrow { font-size:9px; color:var(--ghost); letter-spacing:4px; font-weight:700; }
.lobby-username { font-size:13px; color:var(--text); font-weight:700; }
.mode-pick { display:flex; gap:6px; }
.join-row  { display:flex; gap:8px; }
.join-row .field { flex:1; text-transform:uppercase; letter-spacing:10px; font-size:22px; text-align:center; font-weight:900; }

/* in-lobby */
.code-banner {
  text-align:center; padding:22px 14px;
  background:var(--bg); border:1px solid var(--border); border-radius:10px;
  cursor:pointer; transition:border-color 0.15s;
}
.code-banner:hover { border-color:var(--blue); }
.code-banner .label { font-size:9px; color:var(--ghost); letter-spacing:3px; font-weight:700; margin-bottom:8px; }
.code-banner .code  { font-size:44px; letter-spacing:16px; color:var(--blue); font-weight:900; }
.player-list { display:flex; flex-direction:column; gap:8px; min-height:80px; }
.team-label  { font-size:9px; color:var(--ghost); letter-spacing:4px; font-weight:700; margin-top:4px; }
.player-row  { display:flex; align-items:center; gap:10px; padding:10px 14px; background:var(--bg); border:1px solid var(--border); border-radius:8px; }
.player-dot  { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
.player-name { flex:1; font-size:13px; color:var(--text); font-weight:500; }
.player-ready{ font-size:10px; color:#4ade80; letter-spacing:2px; font-weight:700; }
.player-wait { font-size:10px; color:var(--ghost); letter-spacing:1px; }
.lobby-status-msg { font-size:11px; color:var(--muted); text-align:center; }

/* settings */
#settings { overflow-y:auto; }
.settings-box { width:420px; max-height:88vh; overflow-y:auto; }
.settings-title { font-size:14px; font-weight:700; letter-spacing:6px; color:var(--text); text-align:center; }
.bind-group { font-size:9px; color:var(--ghost); letter-spacing:4px; font-weight:700; margin:10px 0 4px; border-top:1px solid var(--border); padding-top:8px; }
.bind-row   { display:flex; align-items:center; justify-content:space-between; padding:5px 0; }
.bind-label { font-size:12px; color:var(--muted); font-weight:500; }
.bind-key {
  min-width:80px; padding:5px 12px; font-size:11px; font-weight:700; letter-spacing:1px;
  cursor:pointer; background:var(--bg); color:var(--muted);
  border:1px solid var(--border); border-radius:6px; text-align:center; transition:all 0.12s;
}
.bind-key:hover { color:var(--text); border-color:var(--muted); }
.bind-key.listening { background:rgba(250,200,50,0.08); color:#fbbf24; border-color:#78500a; animation:pulse 0.7s infinite alternate; }
@keyframes pulse { from{opacity:0.6} to{opacity:1} }
.settings-footer { display:flex; gap:10px; margin-top:12px; }
.settings-footer button {
  flex:1; padding:10px 0; font-size:11px; font-weight:700; letter-spacing:2px;
  cursor:pointer; border-radius:7px; border:1px solid var(--border); background:transparent;
  color:var(--ghost); font-family:'Inter',sans-serif; transition:all 0.12s;
}
.settings-footer button:hover { color:var(--muted); border-color:var(--muted); }

/* matchmaking */
.mm-box { display:flex; flex-direction:column; align-items:center; gap:16px; }
.mm-spinner {
  width:44px; height:44px; border-radius:50%;
  border:3px solid var(--border); border-top-color:var(--blue);
  animation:spin 0.75s linear infinite;
}
@keyframes spin { to { transform:rotate(360deg); } }
.mm-title { font-size:10px; font-weight:700; letter-spacing:5px; color:var(--muted); }
.mm-mode  { font-size:38px; font-weight:900; color:var(--text); letter-spacing:4px; }
.mm-timer { font-size:22px; font-weight:300; color:var(--muted); font-variant-numeric:tabular-nums; }
.mm-status{ font-size:11px; color:var(--ghost); letter-spacing:1px; }

/* online indicator */
#online-indicator {
  position:fixed; top:14px; right:14px; font-size:10px; font-weight:700;
  background:rgba(4,20,10,0.9); color:#4ade80; padding:6px 16px;
  border:1px solid #14532d; border-radius:999px; letter-spacing:2px; z-index:100; display:none;
}
#online-indicator.show { display:block; }
</style>
</head>
<body>
<div id="wrap">
  <canvas id="c" width="1080" height="792"></canvas>

  <div id="menu" class="overlay show">
    <div class="menu-layout">
      <div class="menu-left">
        <div class="menu-logo">BOX<br>FIGHT</div>
        <div class="menu-tag">build · edit · outplay</div>
        <div class="menu-diff-group">
          <div class="diff-label">DIFFICULTY</div>
          <div class="diff-pills">
            <button class="diff-btn sel" data-d="easy">EASY</button>
            <button class="diff-btn" data-d="medium">MEDIUM</button>
            <button class="diff-btn" data-d="hard">HARD</button>
          </div>
        </div>
      </div>
      <div class="menu-right">
        <button class="nav-btn" id="btn-vsbot">VS BOT<span class="arr">›</span></button>
        <button class="nav-btn" id="btn-survival">SURVIVAL<span class="arr">›</span></button>
        <button class="nav-btn" id="btn-freebuild">FREE BUILD<span class="arr">›</span></button>
        <button class="nav-btn nav-online" id="btn-play-online">PLAY ONLINE<span class="arr">›</span></button>
        <div class="nav-sep"></div>
        <button class="nav-btn nav-sub" id="btn-settings-menu">SETTINGS & KEYBINDS<span class="arr">›</span></button>
      </div>
    </div>
  </div>

  <!-- Auth overlay -->
  <div id="auth" class="overlay" style="z-index:20">
    <div class="auth-box">
      <div class="auth-title">BOX FIGHT</div>
      <div class="auth-tabs">
        <button class="auth-tab sel" id="tab-si">SIGN IN</button>
        <button class="auth-tab" id="tab-su">SIGN UP</button>
      </div>
      <input class="field" id="auth-email" type="email" placeholder="Email address">
      <input class="field" id="auth-pass"  type="password" placeholder="Password">
      <input class="field" id="auth-user"  type="text" placeholder="Username  (3–16 chars)" style="display:none">
      <button class="prim-btn" id="btn-auth-submit">SIGN IN</button>
      <div class="err-msg" id="auth-err"></div>
      <button class="link-btn" id="btn-auth-back">← Back to menu</button>
    </div>
  </div>

  <!-- Matchmaking waiting screen -->
  <div id="matchmaking" class="overlay" style="z-index:25">
    <div class="mm-box">
      <div class="mm-title">FINDING MATCH</div>
      <div class="mm-spinner"></div>
      <div class="mm-mode" id="mm-mode-label">1V1</div>
      <div class="mm-timer" id="mm-timer">0:00</div>
      <div class="mm-status" id="mm-status">Searching for players…</div>
      <button class="sm-btn" id="btn-cancel-mm" style="margin-top:4px">CANCEL</button>
    </div>
  </div>

  <!-- Online lobby hub -->
  <div id="lobby-screen" class="overlay" style="z-index:20">
    <div class="lobby-box">
      <div class="lobby-header">
        <span class="lobby-eyebrow">ONLINE</span>
        <span class="lobby-username" id="online-username"></span>
      </div>

      <div style="font-size:9px;color:var(--ghost);letter-spacing:4px;font-weight:700">QUICK MATCH</div>
      <div class="mode-pick">
        <button class="diff-btn sel" data-m="1v1">1v1</button>
        <button class="diff-btn" data-m="2v2">2v2</button>
      </div>
      <button class="prim-btn" id="btn-quick-match">FIND MATCH</button>

      <div style="height:1px;background:var(--border);margin:2px 0"></div>

      <div style="font-size:9px;color:var(--ghost);letter-spacing:4px;font-weight:700">PRIVATE LOBBY</div>
      <button class="sm-btn" id="btn-create-lobby" style="width:100%;padding:10px 0">CREATE LOBBY</button>
      <div class="join-row">
        <input class="field" id="join-code-input" placeholder="CODE" maxlength="4">
        <button class="sm-btn" id="btn-join-lobby">JOIN</button>
      </div>

      <div class="err-msg" id="lobby-err"></div>
      <button class="link-btn" id="btn-lobby-back">← Back to menu</button>
    </div>
  </div>

  <!-- Waiting room -->
  <div id="in-lobby" class="overlay" style="z-index:20">
    <div class="in-lobby-box">
      <div class="code-banner">
        <div class="label">LOBBY CODE · click to copy</div>
        <div class="code" id="lobby-code-disp">----</div>
      </div>
      <div id="mode-disp" style="font-size:9px;color:var(--ghost);text-align:center;letter-spacing:4px;font-weight:700">1V1</div>
      <div class="player-list" id="player-list"></div>
      <div class="lobby-status-msg" id="lobby-status-msg">Waiting for players…</div>
      <div class="btn-row" style="justify-content:center;margin-top:4px">
        <button class="prim-btn" id="btn-ready" style="width:160px">READY</button>
        <button class="sm-btn" id="btn-leave-lobby">LEAVE</button>
      </div>
    </div>
  </div>

  <div id="online-indicator"></div>

  <div id="pause" class="overlay" style="flex-direction:column;gap:12px">
    <div class="pause-title">PAUSED</div>
    <div class="pause-sub">CLICK TO RESUME</div>
    <div style="display:flex;gap:10px;margin-top:8px">
      <button class="sm-btn" id="btn-settings-pause">KEYBINDS</button>
      <button class="sm-btn" id="btn-exit-game" style="color:#f87171;border-color:#3a1010">EXIT GAME</button>
    </div>
  </div>

  <div id="settings" class="overlay">
    <div class="settings-box">
      <div class="settings-title">KEYBINDS</div>
      <div id="keybind-list"></div>
      <div class="settings-footer">
        <button id="btn-defaults">RESET DEFAULTS</button>
        <button id="btn-settings-back">BACK</button>
      </div>
    </div>
  </div>

  <div id="result" class="overlay" style="flex-direction:column;gap:16px">
    <div id="resultText"></div>
    <div id="resultSub"></div>
    <div class="btn-row">
      <button class="prim-btn" id="btn-again" style="width:160px">PLAY AGAIN</button>
      <button class="sm-btn" id="btn-menu">MENU</button>
    </div>
  </div>
</div>

// ═══════════════════════════════════════════════════════════════════════════════
// CANONICAL EDGE KEYS
// ═══════════════════════════════════════════════════════════════════════════════
const edgeKey = (cx, cy, side) =>
  side === 'N' ? `h,${cx},${cy}` : side === 'S' ? `h,${cx},${cy+1}` :
  side === 'W' ? `v,${cx},${cy}` : `v,${cx+1},${cy}`;

function keyMeta(key) { const p = key.split(','); return { type:p[0], a:+p[1], b:+p[2] }; }

function wallRect(key) {
  const { type, a, b } = keyMeta(key), half = WALL_THICK / 2;
  return type === 'h'
    ? { x:a*CELL, y:b*CELL-half, w:CELL, h:WALL_THICK }
    : { x:a*CELL-half, y:b*CELL, w:WALL_THICK, h:CELL };
}
function wallSegs(key, wall) {
  if (wall.state === 'full') return [wallRect(key)];
  const { type, a, b } = keyMeta(key), half = WALL_THICK/2, frac = CELL*WIN_FRAC;
  return type === 'h'
    ? [{ x:a*CELL, y:b*CELL-half, w:frac, h:WALL_THICK }, { x:a*CELL+CELL-frac, y:b*CELL-half, w:frac, h:WALL_THICK }]
    : [{ x:a*CELL-half, y:b*CELL, w:WALL_THICK, h:frac }, { x:a*CELL-half, y:b*CELL+CELL-frac, w:WALL_THICK, h:frac }];
}
function hashKey(key) {
  let h = 5381;
  for (let i = 0; i < key.length; i++) h = ((h << 5) + h + key.charCodeAt(i)) & 0x7fffffff;
  return h;
}

function makeAmmo() {

// ═══════════════════════════════════════════════════════════════════════════════
// GEOMETRY
// ═══════════════════════════════════════════════════════════════════════════════
const closestPt = (px, py, rx, ry, rw, rh) => ({
  x: Math.max(rx, Math.min(px, rx+rw)),
  y: Math.max(ry, Math.min(py, ry+rh)),
});
function circleHitsRect(px, py, r, rx, ry, rw, rh) {
  const cp = closestPt(px, py, rx, ry, rw, rh);
  const dx = px-cp.x, dy = py-cp.y;
  return dx*dx + dy*dy < r*r;
}
function resolveRect(e, rx, ry, rw, rh) {
  if (!circleHitsRect(e.x, e.y, e.radius, rx, ry, rw, rh)) return;
  const cp = closestPt(e.x, e.y, rx, ry, rw, rh);
  const dx = e.x-cp.x, dy = e.y-cp.y;
  const dist = Math.sqrt(dx*dx+dy*dy) || 0.001;
  const pen  = e.radius - dist;
  e.x += (dx/dist)*pen; e.y += (dy/dist)*pen;
}
function resolveWalls(e) {
  for (const [key, wall] of Object.entries(walls))
    for (const seg of wallSegs(key, wall))
      resolveRect(e, seg.x, seg.y, seg.w, seg.h);
}
function clampArena(e) {
  const r = e.radius;
  e.x = Math.max(r, Math.min(W-r, e.x));
  e.y = Math.max(r, Math.min(H-r, e.y));
}
function wrapAngle(a) {
  while (a > Math.PI)  a -= Math.PI*2;
  while (a < -Math.PI) a += Math.PI*2;
  return a;
}
function dist2(ax, ay, bx, by) { return (ax-bx)**2 + (ay-by)**2; }

// ═══════════════════════════════════════════════════════════════════════════════
// SCREEN EFFECTS

function doShake(n) { shake.intensity = Math.max(shake.intensity, n); }
function triggerSlowMo(dur) { timeScale = 0.18; slowMoTimer = dur; }

// ─── Keybind helpers ─────────────────────────────────────────────────────────
function keyLabel(code) {
  if (!code) return '—';
  if (code.startsWith('Key'))   return code.slice(3);
  if (code.startsWith('Digit')) return code.slice(5);
  const map = { Space:'SPACE', ArrowUp:'↑', ArrowDown:'↓', ArrowLeft:'←', ArrowRight:'→',
    ShiftLeft:'L-SHIFT', ShiftRight:'R-SHIFT', ControlLeft:'L-CTRL', ControlRight:'R-CTRL',
    AltLeft:'L-ALT', AltRight:'R-ALT', Tab:'TAB', CapsLock:'CAPS', Backquote:'`',
    Minus:'-', Equal:'=', BracketLeft:'[', BracketRight:']', Backslash:'\\',
    Semicolon:';', Quote:"'", Comma:',', Period:'.', Slash:'/' };
  return map[code] || code;
}
function loadKeybinds() {
  try { const s = localStorage.getItem('bf_binds'); if (s) keybinds = { ...DEFAULT_BINDS, ...JSON.parse(s) }; } catch(e) {}
}
function saveKeybinds() {
  try { localStorage.setItem('bf_binds', JSON.stringify(keybinds)); } catch(e) {}
}
function openSettings(from) {
  settingsFrom = from;
  listeningFor = null;
  renderSettingsUI();
  document.getElementById('settings').classList.add('show');
}

  document.getElementById('settings').classList.remove('show');
  if (settingsFrom === 'pause') document.getElementById('pause').classList.add('show');
  else document.getElementById('menu').classList.add('show');
}
function renderSettingsUI() {
  const list = document.getElementById('keybind-list');
  list.innerHTML = '';
  for (const def of BIND_DEFS) {
    if (def.group) {
      const g = document.createElement('div');
      g.className = 'bind-group'; g.textContent = def.group;
      list.appendChild(g); continue;
    }
    const row = document.createElement('div'); row.className = 'bind-row';
    const lbl = document.createElement('span'); lbl.className = 'bind-label'; lbl.textContent = def.label;
    const btn = document.createElement('button');
    btn.className = 'bind-key' + (listeningFor === def.key ? ' listening' : '');
    btn.textContent = listeningFor === def.key ? 'PRESS KEY…' : keyLabel(keybinds[def.key]);
    btn.onclick = () => {
      listeningFor = listeningFor === def.key ? null : def.key;
      renderSettingsUI();
    };
    row.appendChild(lbl); row.appendChild(btn);
    list.appendChild(row);
  }
}

function addComboHit(x, y) {
  combo++;

  if (combo >= 2) {
    const label = COMBO_LABELS[Math.min(combo, COMBO_LABELS.length-1)] || `${combo}x COMBO`;
    spawnFloat(x || W/2, (y || H/2) - 20, label, '#ffcc00', combo >= 6 ? 22 : 17);

// PARTICLES

function spawnParticles(x, y, color, count, speedScale) {
  const ss = speedScale || 1;
  for (let i = 0; i < count; i++) {
    const a = Math.random()*Math.PI*2, spd = (1.5+Math.random()*3)*ss;
    const life = (15+Math.random()*25)|0;
    particles.push({ x, y, vx:Math.cos(a)*spd, vy:Math.sin(a)*spd, life, maxLife:life, color });
  }
}

// ═══════════════════════════════════════════════════════════════════════════════
// BUILDING
// ═══════════════════════════════════════════════════════════════════════════════
function angleToSide(a) {
  const n = ((a % (Math.PI*2)) + Math.PI*2) % (Math.PI*2);
  if (n < Math.PI/4 || n >= 7*Math.PI/4) return 'E';
  if (n < 3*Math.PI/4) return 'S';
  if (n < 5*Math.PI/4) return 'W';
  return 'N';
}
function entityCell(e) { return { cx: Math.floor(e.x/CELL), cy: Math.floor(e.y/CELL) }; }

function tryBuild(entity) {
  const now = performance.now();
  if (now - entity.lastBuild < BUILD_CD) return false;
  if (entity.materials < MAT_COST) return false;
  const { cx, cy } = entityCell(entity);
  const key = edgeKey(cx, cy, angleToSide(entity.aimAngle));
  if (walls[key]) return false;
  walls[key] = { hp: WALL_START_HP, state: 'full' };
  if (entity.materials !== Infinity) entity.materials -= MAT_COST;
  entity.lastBuild = now;
  spawnParticles(cx*CELL+CELL/2, cy*CELL+CELL/2, '#5588ff', 4);
  if (gameMode === 'online' && entity === player) netSend('wall', { t:'place', key });
  return true;
}
function tryEdit(entity, toState) {
  const { cx, cy } = entityCell(entity);
  const key = edgeKey(cx, cy, angleToSide(entity.aimAngle));
  if (!walls[key]) return;
  const ns = toState !== undefined ? toState : (walls[key].state === 'full' ? 'window' : 'full');
  walls[key].state = ns;
  if (gameMode === 'online' && entity === player) netSend('wall', { t:'edit', key, state:ns });
}

// ═══════════════════════════════════════════════════════════════════════════════
// KILL HANDLING
// ═══════════════════════════════════════════════════════════════════════════════
function applyDamage(target, amount, source) {
  if (target.dead || target.dashInvincible) return 0;

  // Shield absorbs damage first
  const shieldDmg = Math.min(target.shield || 0, amount);
  target.shield   = Math.max(0, (target.shield || 0) - shieldDmg);
  const hpDmg     = Math.min(Math.max(0, target.hp), amount - shieldDmg);
  target.hp      -= hpDmg;
  const actual    = shieldDmg + hpDmg;
  if (actual <= 0) return 0;

  if (target === player) {
    usingPotion = null;   // interrupt any active potion
    playerHitFlash = 1;
    doShake(5);
    combo = 0;
    const col = shieldDmg > 0 && hpDmg === 0 ? '#88ccff' : '#ff4444';
    spawnFloat(target.x, target.y-28, `-${Math.ceil(actual)}`, col, 14);
  } else {
    addComboHit(target.x, target.y);
    spawnFloat(target.x, target.y-28, String(Math.ceil(actual)), '#fff', 14);
  }

  if (target.hp <= 0 && !target.dead) {
    target.dead = true;
    target.hp = 0;
    if (target === player) {
      doShake(12); playerHitFlash = 1;
      spawnParticles(target.x, target.y, '#4488ff', 20);
      spawnParticles(target.x, target.y, '#fff', 8);
      triggerSlowMo(650);
      checkGameOver();
    } else {
      totalKills++;
      triggerSlowMo(650);
      killFlash = 1;
      doShake(8);
      spawnParticles(target.x, target.y, '#ff5533', 22);
      spawnParticles(target.x, target.y, '#ffcc00', 10);
      spawnParticles(target.x, target.y, '#fff', 6);
      spawnFloat(target.x, target.y-45, 'ELIMINATED!', '#44ff88', 18);
      const w = source?.weapon || source?.owner?.weapon;
      if (w) killfeed.unshift({ text:`You eliminated Bot [${w.toUpperCase()}]`, life:4500 });
      bots = bots.filter(b => b !== target);
      if (gameMode === 'survival') checkWaveClear();
      else checkGameOver();
    }
  }
  return actual;
}

// ═══════════════════════════════════════════════════════════════════════════════
// EXPLOSIONS
// ═══════════════════════════════════════════════════════════════════════════════
function createExplosion(x, y, owner) {
  explosions.push({ x, y, r: 0, maxR: EXPL_RADIUS, life: 380, maxLife: 380 });
  doShake(16); killFlash = 0.5;
  spawnParticles(x, y, '#ff7700', 28, 1.8);
  spawnParticles(x, y, '#ffcc00', 16, 1.2);
  spawnParticles(x, y, '#ffffff', 10, 2.2);

  // Wall AOE
  for (const key of Object.keys(walls)) {
    const wall = walls[key]; if (!wall) continue;
    const wr = wallRect(key);
    const wx = wr.x+wr.w/2, wy = wr.y+wr.h/2;
    const d = Math.sqrt(dist2(wx, wy, x, y));
    if (d < EXPL_RADIUS) {
      wall.hp -= 80 * (1 - d/EXPL_RADIUS*0.5);
      if (wall.hp <= 0) { spawnParticles(wx, wy, '#ffaa33', 5); delete walls[key]; if (gameMode==='online'&&owner===player) netSend('wall',{t:'destroy',key}); }
    }
  }

  // Entity AOE
  const targets = [player, ...bots];
  for (const t of targets) {
    if (t === owner || t.dead) continue;
    const d = Math.sqrt(dist2(t.x, t.y, x, y));
    if (d < EXPL_RADIUS + t.radius) {
      const falloff = Math.max(0, 1 - d / EXPL_RADIUS);
      const dmg = 40 * falloff;
      const angle = Math.atan2(t.y-y, t.x-x);
      t.x += Math.cos(angle) * 45 * falloff;
      t.y += Math.sin(angle) * 45 * falloff;
      clampArena(t); resolveWalls(t);
      applyDamage(t, dmg, { weapon: 'rocket', owner });
    }
  }
}

// ═══════════════════════════════════════════════════════════════════════════════
// WEAPONS — SPAWN BULLET
// ═══════════════════════════════════════════════════════════════════════════════
function spawnBullet(entity, angle, wep) {
  const barrel = entity.radius + 6;
  const bx = entity.x + Math.cos(entity.aimAngle)*barrel;
  const by = entity.y + Math.sin(entity.aimAngle)*barrel;
  const bul = {
    x: bx, y: by, prevX: bx, prevY: by,
    vx: Math.cos(angle)*BULLET_SPEED,
    vy: Math.sin(angle)*BULLET_SPEED,
    owner: entity, life: wep.range,
    wallDmg: wep.wallDmg, playerDmg: wep.playerDmg,
    col: wep.col, sz: wep.sz,
    pierce: !!wep.pierce, isRocket: !!wep.isRocket,
  };
  bullets.push(bul);
  if (gameMode === 'online' && entity === player)
    netSend('bullet', { x:bx, y:by, vx:bul.vx, vy:bul.vy, wallDmg:wep.wallDmg, playerDmg:wep.playerDmg, col:wep.col, sz:wep.sz, pierce:!!wep.pierce, isRocket:!!wep.isRocket, range:wep.range });
}

// ═══════════════════════════════════════════════════════════════════════════════
// WEAPONS — FIRE
// ═══════════════════════════════════════════════════════════════════════════════
function tryFireWeapon(entity) {
  const now = performance.now();
  const wep = WEAPONS[entity.weapon];
  if (!wep) return;

  if (entity.weapon === 'pickaxe') { trySwingPickaxe(entity); return; }

  const ws = entity.ammo[entity.weapon];
  if (now < ws.reloadEnd) return;

  if (ws.count <= 0) {
    ws.reloadEnd = now + wep.reloadTime * (entity.isBot ? 0.65 : 1);
    ws.count = wep.magSize;
    if (!entity.isBot) spawnFloat(entity.x, entity.y-22, 'RELOADING', '#ffcc44', 12);
    return;
  }

  const diff = entity.isBot ? BOT_DIFF[entity.difficulty || 'medium'] : null;
  const cd   = diff ? wep.cd * diff.fireMult : wep.cd;
  if (now - entity.lastFire < cd) return;
  entity.lastFire = now;

  const extraSpread = diff ? diff.aimSpread : 0;
  for (let i = 0; i < (wep.pellets || 1); i++) {
    const angle = entity.aimAngle + (Math.random()-0.5)*2*(wep.spread+extraSpread);
    spawnBullet(entity, angle, wep);
  }
  ws.count--;
  if (ws.count <= 0) {
    ws.reloadEnd = now + wep.reloadTime * (entity.isBot ? 0.65 : 1);
    ws.count = wep.magSize;
  }
}

// ═══════════════════════════════════════════════════════════════════════════════
// PICKAXE MELEE
// ═══════════════════════════════════════════════════════════════════════════════
function trySwingPickaxe(entity) {
  const now = performance.now();
  const wep = WEAPONS.pickaxe;
  if (now - entity.lastFire < wep.cd) return;
  entity.lastFire = now;
  entity.swingStart = now;

  for (const key of Object.keys(walls)) {
    const wall = walls[key]; if (!wall) continue;
    let hitPt = null;
    for (const seg of wallSegs(key, wall)) {
      const cp = closestPt(entity.x, entity.y, seg.x, seg.y, seg.w, seg.h);
      const dx = cp.x-entity.x, dy = cp.y-entity.y;
      const d  = Math.sqrt(dx*dx+dy*dy);
      if (d > wep.reach) continue;
      if (Math.abs(wrapAngle(Math.atan2(dy,dx) - entity.aimAngle)) > wep.arc) continue;
      hitPt = cp; break;
    }
    if (!hitPt) continue;
    doShake(4);
    wall.hp -= wep.wallDmg;
    spawnParticles(hitPt.x, hitPt.y, '#f0c83c', 5);
    if (wall.hp <= 0) { const r = wallRect(key); spawnParticles(r.x+r.w/2, r.y+r.h/2, '#ffaa33', 8); delete walls[key]; if (gameMode==='online'&&entity===player) netSend('wall',{t:'destroy',key}); }
  }

  for (const t of [...bots, player]) {
    if (t === entity || t.dead || gameMode === 'freebuild') continue;
    const dx = t.x-entity.x, dy = t.y-entity.y;
    const d  = Math.sqrt(dx*dx+dy*dy);
    if (d < wep.reach+t.radius && Math.abs(wrapAngle(Math.atan2(dy,dx)-entity.aimAngle)) < wep.arc) {
      applyDamage(t, wep.playerDmg, entity);
    }
  }
}

// ═══════════════════════════════════════════════════════════════════════════════
// BULLET UPDATE
// ═══════════════════════════════════════════════════════════════════════════════
function updateBullets() {
  const next = [];
  outer: for (const b of bullets) {
    b.prevX = b.x; b.prevY = b.y;
    b.x += b.vx; b.y += b.vy;
    if (--b.life <= 0 || b.x < 0 || b.x > W || b.y < 0 || b.y > H) {
      if (b.isRocket) createExplosion(b.x, b.y, b.owner);
      continue;
    }

    const br = b.sz;
    let piercedWall = false;
    for (const [key, wall] of Object.entries(walls)) {
      if (!wall) continue;
      let wallHit = false;
      for (const seg of wallSegs(key, wall)) {
        if (b.x+br < seg.x || b.x-br > seg.x+seg.w || b.y+br < seg.y || b.y-br > seg.y+seg.h) continue;
        wallHit = true; break;
      }
      if (!wallHit) continue;

      if (b.isRocket) { createExplosion(b.x, b.y, b.owner); continue outer; }

      wall.hp -= b.wallDmg;
      spawnParticles(b.x, b.y, '#bb7722', 3);
      if (wall.hp <= 0) { const r = wallRect(key); spawnParticles(r.x+r.w/2, r.y+r.h/2, '#ffaa33', 7); delete walls[key]; if (gameMode==='online'&&!b.owner?.isRemote) netSend('wall',{t:'destroy',key}); }

      if (!b.pierce) { continue outer; }
      piercedWall = true; // sniper continues but don't double-hit this wall
      break;
    }

    // Entity hits
    for (const t of [player, ...bots]) {
      if (t === b.owner || t.dead) continue;
      if (dist2(b.x, b.y, t.x, t.y) < (t.radius+br)**2) {
        if (b.isRocket) {
          // remote rockets: visual explosion only; their client sends hit events
          if (!b.owner?.isRemote) createExplosion(b.x, b.y, b.owner);
          else spawnParticles(b.x, b.y, '#ff7700', 15);
        } else if (gameMode === 'online' && t.isRemote && !b.owner?.isRemote) {
          // My bullet hit remote player → send hit event
          netSend('hit', { targetId: t.id, damage: b.playerDmg });
          spawnParticles(b.x, b.y, '#ff8844', 6);
        } else if (gameMode === 'online' && b.owner?.isRemote && t === player) {
          // Remote bullet visually hit me — actual damage comes via hit event
          spawnParticles(b.x, b.y, '#ff4444', 4);
        } else {
          applyDamage(t, b.playerDmg, b);
        }
        continue outer;
      }
    }

    next.push(b);
  }
  bullets = next;
}

// ═══════════════════════════════════════════════════════════════════════════════
// SHIELD POTIONS
// ═══════════════════════════════════════════════════════════════════════════════
function startPotion(type) {
  if (player.dead || usingPotion) return;
  if (type === 'mini') {
    if (player.minis <= 0) { spawnFloat(player.x, player.y-30, 'NO MINIS', '#ff6644', 12); return; }
    if (player.shield >= MINI_SHIELD_CAP) { spawnFloat(player.x, player.y-30, 'SHIELD FULL', '#88ccff', 12); return; }
  } else {
    if (player.bigPots <= 0) { spawnFloat(player.x, player.y-30, 'NO POTIONS', '#ff6644', 12); return; }
    if (player.shield >= SHIELD_MAX) { spawnFloat(player.x, player.y-30, 'SHIELD FULL', '#88ccff', 12); return; }
  }
  usingPotion = { type, startTime: performance.now(), duration: type === 'mini' ? MINI_USE_MS : BIG_USE_MS };
}

function updatePotion() {
  if (!usingPotion || player.dead) { usingPotion = null; return; }
  // Cancel if the player moves while drinking
  if (performance.now() - usingPotion.startTime >= usingPotion.duration) {
    if (usingPotion.type === 'mini') {
      player.shield = Math.min(MINI_SHIELD_CAP, player.shield + MINI_AMOUNT);
      player.minis--;
      spawnFloat(player.x, player.y-30, `+${MINI_AMOUNT} SHIELD`, '#88ccff', 14);
    } else {
      player.shield = Math.min(SHIELD_MAX, player.shield + BIG_POT_AMOUNT);
      player.bigPots--;
      spawnFloat(player.x, player.y-30, `+${BIG_POT_AMOUNT} SHIELD`, '#bb88ff', 14);
    }
    spawnParticles(player.x, player.y, usingPotion.type === 'mini' ? '#88ccff' : '#bb88ff', 12, 0.8);
    usingPotion = null;
  }
}

// ═══════════════════════════════════════════════════════════════════════════════
// LINE-OF-SIGHT
// ═══════════════════════════════════════════════════════════════════════════════
function hasLOS(x1, y1, x2, y2) {
  const dx = x2-x1, dy = y2-y1;
  const steps = Math.ceil(Math.sqrt(dx*dx+dy*dy)/5);
  for (let i = 1; i < steps; i++) {
    const t = i/steps, px = x1+dx*t, py = y1+dy*t;
    for (const [key, wall] of Object.entries(walls))
      for (const seg of wallSegs(key, wall))
        if (px >= seg.x && px <= seg.x+seg.w && py >= seg.y && py <= seg.y+seg.h) return false;
  }
  return true;
}

// ═══════════════════════════════════════════════════════════════════════════════
// BOT AI
// ═══════════════════════════════════════════════════════════════════════════════
function updateBot(b, scaledDt) {
  if (b.dead || b.hp <= 0) return;
  const diff = BOT_DIFF[b.difficulty] || BOT_DIFF.medium;

  const dx = player.x-b.x, dy = player.y-b.y;
  const dist = Math.sqrt(dx*dx+dy*dy) || 1;
  b.aimAngle = Math.atan2(dy, dx);
  b.botPhase += 0.045 * scaledDt / FRAME_MS;

  // Peek behavior (hard bots)
  if (diff.peeks) {
    if (b.peekState === 'idle') {
      b.peekTimer += scaledDt;
      if (b.peekTimer > 2000 + Math.random()*1000) {
        b.peekTimer = 0;
        if (!hasLOS(b.x, b.y, player.x, player.y)) {
          const { cx, cy } = entityCell(b);
          const key = edgeKey(cx, cy, angleToSide(b.aimAngle));
          if (walls[key] && walls[key].state === 'full') {
            b.peekState = 'peeking';
            b.peekKey   = key;
            b.peekTimer = 650;
            walls[key].state = 'window';
          }
        }
      }
    } else if (b.peekState === 'peeking') {
      b.peekTimer -= scaledDt;
      tryFireWeapon(b);
      if (b.peekTimer <= 0) {
        if (walls[b.peekKey]) walls[b.peekKey].state = 'full';
        b.peekState = 'idle';
        b.peekKey   = null;
        b.peekTimer = 800;
      }
    }
  }

  const perpX = -dy/dist, perpY = dx/dist;
  const strafe = Math.sin(b.botPhase);
  const spd    = BOT_BASE_SPEED * diff.spd;
  let mx = perpX*strafe, my = perpY*strafe;
  if (dist > diff.idealDist+20)       { mx += dx/dist*0.9; my += dy/dist*0.9; }
  else if (dist < diff.idealDist-20)  { mx -= dx/dist*0.9; my -= dy/dist*0.9; }

  const step = spd * scaledDt / FRAME_MS / SUB_STEPS;
  for (let i = 0; i < SUB_STEPS; i++) {
    b.x += mx*step; resolveWalls(b);
    b.y += my*step; resolveWalls(b);
  }
  clampArena(b);

  b.botTimer += scaledDt;
  if (b.botTimer > 1400) { b.botTimer = 0; tryBuild(b); }

  if (b.peekState === 'idle' && hasLOS(b.x, b.y, player.x, player.y)) tryFireWeapon(b);
}

// ═══════════════════════════════════════════════════════════════════════════════
// PLAYER UPDATE
// ═══════════════════════════════════════════════════════════════════════════════
function updatePlayer(scaledDt) {
  if (player.dead) return;

  const now = performance.now();
  const locked = document.pointerLockElement === canvas;

  // Free-cursor aim (not locked)
  if (!locked)
    player.aimAngle = Math.atan2(mouse.y - player.y, mouse.x - player.x);

  // Movement direction
  let mx = 0, my = 0;
  const kb = keybinds;
  if (keys[kb.up]   || keys['ArrowUp'])    my -= 1;
  if (keys[kb.down] || keys['ArrowDown'])  my += 1;
  if (keys[kb.left] || keys['ArrowLeft'])  mx -= 1;
  if (keys[kb.right]|| keys['ArrowRight']) mx += 1;
  const mag = Math.sqrt(mx*mx+my*my)||1;
  if (mx||my) { mx/=mag; my/=mag; }

  const startX = player.x, startY = player.y;

  // Dash
  if (now < player.dashEnd) {
    player.dashInvincible = true;
    const step  = player.dashVx * scaledDt / FRAME_MS / SUB_STEPS;
    const stepy = player.dashVy * scaledDt / FRAME_MS / SUB_STEPS;
    for (let i = 0; i < SUB_STEPS; i++) {
      player.x += step;  resolveWalls(player);
      player.y += stepy; resolveWalls(player);
    }
    if (Math.random() > 0.35) afterimages.push({ x:player.x, y:player.y, life:10, maxLife:10 });
  } else {
    player.dashInvincible = false;
    const spd = P_SPEED * scaledDt / FRAME_MS / SUB_STEPS;
    for (let i = 0; i < SUB_STEPS; i++) {
      player.x += mx*spd; resolveWalls(player);
      player.y += my*spd; resolveWalls(player);
    }
  }
  clampArena(player);

  // Locked: translate world-cursor with player so aim stays stable while moving
  if (locked) {
    virtualMouse.x += player.x - startX;
    virtualMouse.y += player.y - startY;
    // Enforce minimum distance so cursor never collapses onto player
    const cdx = virtualMouse.x - player.x, cdy = virtualMouse.y - player.y;
    const cd  = Math.sqrt(cdx*cdx + cdy*cdy) || 1;
    if (cd < 50) { virtualMouse.x = player.x + cdx/cd*50; virtualMouse.y = player.y + cdy/cd*50; }
    player.aimAngle = Math.atan2(virtualMouse.y - player.y, virtualMouse.x - player.x);
  }

  // Dash cooldown decay (real time — dashCd is a timestamp)
  // (uses performance.now() so no dt needed)

  if (gameMode !== 'freebuild' && player.materials < MAT_MAX)
    player.materials = Math.min(MAT_MAX, player.materials + MAT_REGEN * scaledDt / FRAME_MS);

  // Advance / complete an in-progress shield potion (can't act while drinking)
  updatePotion();
  if (!usingPotion) {
    if (mouse.buttons & 1) tryFireWeapon(player);
    if (mouse.buttons & 2) tryBuild(player);
  }

  // Storm damage
  if (gameMode === 'survival') {
    const sd = Math.sqrt(dist2(player.x, player.y, storm.cx, storm.cy));
    if (sd > storm.radius) applyDamage(player, 4 * scaledDt / 1000, null);
  }
}

// ═══════════════════════════════════════════════════════════════════════════════
// WALL REGEN
// ═══════════════════════════════════════════════════════════════════════════════
function updateWalls(dt) {
  for (const wall of Object.values(walls))
    if (wall.hp < WALL_HP) wall.hp = Math.min(WALL_HP, wall.hp + WALL_REGEN * dt / 1000);
}

// ═══════════════════════════════════════════════════════════════════════════════
// SURVIVAL SYSTEM
// ═══════════════════════════════════════════════════════════════════════════════
function randomEdgeSpawn() {
  const m = P_RADIUS+8;
  const edge = Math.floor(Math.random()*4);
  if (edge===0) return { x:m+Math.random()*(W-2*m), y:m };
  if (edge===1) return { x:m+Math.random()*(W-2*m), y:H-m };
  if (edge===2) return { x:m, y:m+Math.random()*(H-2*m) };
  return { x:W-m, y:m+Math.random()*(H-2*m) };
}

function spawnWave(n) {
  waveState = 'active';
  const count = Math.min(1+Math.floor(n/2), 5);
  bots = [];
  for (let i = 0; i < count; i++) {
    const diff = n<=2?'easy': n<=5?'medium':'hard';
    const pos  = randomEdgeSpawn();
    const b    = makeEntity(pos.x, pos.y, true, diff);
    b.shield   = diff==='hard' ? 75 : diff==='medium' ? 40 : 0;
    const weps = BOT_DIFF[diff].weps;
    b.weapon   = weps[Math.floor(Math.random()*weps.length)];
    b.aimAngle = Math.atan2(player.y-b.y, player.x-b.x);
    bots.push(b);
  }
  // Storm shrinks each wave
  storm.radius = Math.max(CELL*4, W*0.9 - n*38);
  if (n > 1) spawnBanner(`WAVE ${n}`, '#ff9933', 30, 2200);
}

function checkWaveClear() {
  if (waveState !== 'active') return;
  if (bots.length > 0) return;
  waveState = 'between';
  waveTimer = 4500;
  // Heal + mats
  player.hp = Math.min(100, player.hp + 30);
  player.materials = Math.min(MAT_MAX, player.materials + 80);
  spawnFloat(player.x, player.y-45, '+30 HP', '#44ff88', 15);
  spawnFloat(player.x, player.y-62, '+80 MATS', '#88aaff', 14);
  spawnBanner(`WAVE ${wave} CLEARED`, '#44ff88', 28, 2500);
}

function updateSurvival(dt) {
  if (waveState !== 'between') return;
  waveTimer -= dt;
  if (waveTimer <= 0) { wave++; spawnWave(wave); }
}

// ═══════════════════════════════════════════════════════════════════════════════
// GAME OVER
// ═══════════════════════════════════════════════════════════════════════════════
function checkOnlineGameOver() {
  if (gameOver) return;
  const enemies = bots.filter(b => b.team !== myTeam);
  const allies  = bots.filter(b => b.team === myTeam);
  const iDead   = player.dead || player.hp <= 0;
  const allTeamDead = iDead && allies.every(a => a.dead || a.hp <= 0);
  const allEnemyDead = enemies.length > 0 && enemies.every(e => e.dead || e.hp <= 0);
  if (!allTeamDead && !allEnemyDead) return;
  gameOver = true; document.exitPointerLock();
  cleanupOnline();
  const el = document.getElementById('resultText');
  el.textContent = allEnemyDead ? 'YOU WIN' : 'YOU LOSE';
  el.style.color = allEnemyDead ? '#44ff88' : '#ff4444';
  document.getElementById('resultSub').textContent = '';
  document.getElementById('result').classList.add('show');
  if (lobbyChannel) netSend('game_end', { winner: allEnemyDead ? currentUser.id : 'enemy' });
}

function checkGameOver() {
  if (gameOver) return;
  if (gameMode === 'online') { checkOnlineGameOver(); return; }
  const playerDead = player.dead || player.hp <= 0;
  const allBotsDead = bots.length === 0 && gameMode === 'vsbot';
  const vsWin = gameMode === 'vsbot' && allBotsDead;
  if (!playerDead && !vsWin) return;

  gameOver = true;
  document.exitPointerLock();
  const el    = document.getElementById('resultText');
  const sub   = document.getElementById('resultSub');
  const over  = document.getElementById('result');

  if (gameMode === 'survival') {
    el.textContent = 'DEAD';
    el.style.color = '#ff4444';
    sub.textContent = `Survived ${wave} wave${wave!==1?'s':''} · ${totalKills} kills`;
  } else {
    const win = vsWin;
    el.textContent = win ? 'YOU WIN' : 'YOU LOSE';
    el.style.color = win ? '#44ff88' : '#ff4444';
    sub.textContent = '';
  }
  over.classList.add('show');
}

// ═══════════════════════════════════════════════════════════════════════════════
// RENDER HELPERS
// ═══════════════════════════════════════════════════════════════════════════════
function wallBodyColor(hp) {
  const t  = Math.max(0, hp/WALL_HP);
  const r  = Math.round(80  + (1-t)*175);
  const g  = Math.round(130 * t);
  const b2 = Math.round(180 * t);
  return `rgb(${r},${g},${b2})`;
}

function drawWallCracks(key, wall) {
  if (wall.hp >= WALL_HP*0.66) return;
  const rect = wallRect(key), { type } = keyMeta(key);
  const h = hashKey(key);
  const cx2 = rect.x+rect.w/2, cy2 = rect.y+rect.h/2;
  ctx.save(); ctx.lineCap = 'round'; ctx.lineWidth = 1;

  if (type === 'h') {
    const x1 = rect.x + (h%18)+3, x2 = rect.x + ((h>>4)%18)+18;
    ctx.strokeStyle = 'rgba(0,0,0,0.55)';
    ctx.beginPath(); ctx.moveTo(x1,cy2-2); ctx.lineTo(x1+5,cy2+2); ctx.lineTo(x1+9,cy2-1); ctx.stroke();
    if (wall.hp < WALL_HP*0.33) {
      ctx.strokeStyle = 'rgba(0,0,0,0.75)';
      ctx.beginPath(); ctx.moveTo(x2,cy2+2); ctx.lineTo(x2+4,cy2-2); ctx.moveTo(x2+7,cy2+1); ctx.lineTo(x2+12,cy2-2); ctx.stroke();
    }
  } else {
    const y1 = rect.y + (h%18)+3, y2 = rect.y + ((h>>4)%18)+18;
    ctx.strokeStyle = 'rgba(0,0,0,0.55)';
    ctx.beginPath(); ctx.moveTo(cx2-2,y1); ctx.lineTo(cx2+2,y1+5); ctx.lineTo(cx2-1,y1+9); ctx.stroke();
    if (wall.hp < WALL_HP*0.33) {
      ctx.strokeStyle = 'rgba(0,0,0,0.75)';
      ctx.beginPath(); ctx.moveTo(cx2+2,y2); ctx.lineTo(cx2-2,y2+4); ctx.moveTo(cx2+1,y2+7); ctx.lineTo(cx2-2,y2+12); ctx.stroke();
    }
  }
  ctx.restore();
}

function drawWallHealthBar(key, wall) {
  if (wall.hp >= WALL_HP-0.5) return;
  const { type, a, b } = keyMeta(key);
  const pct   = wall.hp/WALL_HP;
  const color = pct > 0.65 ? '#44dd55' : pct > 0.35 ? '#ddaa22' : '#dd3333';
  ctx.fillStyle = 'rgba(0,0,0,0.75)';
  if (type === 'h') {
    const x = a*CELL+2, y = b*CELL-WALL_THICK/2-5, bw = CELL-4;
    ctx.fillRect(x,y,bw,4); ctx.fillStyle=color; ctx.fillRect(x,y,bw*pct,4);
  } else {
    const x = a*CELL-WALL_THICK/2-5, y = b*CELL+2, bh = CELL-4;
    ctx.fillRect(x,y,4,bh); ctx.fillStyle=color; ctx.fillRect(x,y,4,bh*pct);
  }
}

function drawPickaxeSwing(e) {
  if (e.swingStart === null) return;
  const elapsed = performance.now()-e.swingStart;
  const dur = WEAPONS.pickaxe.swingDur;
  if (elapsed >= dur) { e.swingStart = null; return; }
  const t = elapsed/dur, arc = WEAPONS.pickaxe.arc, reach = WEAPONS.pickaxe.reach;
  const cur = e.aimAngle - arc + arc*2*t;
  ctx.save(); ctx.lineCap='round';
  ctx.strokeStyle = `rgba(240,200,60,${(1-t)*0.35})`; ctx.lineWidth = reach*0.55;
  ctx.beginPath(); ctx.arc(e.x,e.y,reach*0.65,e.aimAngle-arc,cur); ctx.stroke();
  ctx.strokeStyle = `rgba(240,200,60,${1-t})`; ctx.lineWidth = 4;
  ctx.beginPath(); ctx.moveTo(e.x,e.y);
  ctx.lineTo(e.x+Math.cos(cur)*reach, e.y+Math.sin(cur)*reach); ctx.stroke();
  ctx.fillStyle = `rgba(255,240,100,${1-t})`;
  ctx.beginPath(); ctx.arc(e.x+Math.cos(cur)*reach, e.y+Math.sin(cur)*reach, 4,0,Math.PI*2); ctx.fill();
  ctx.restore();
}

function drawEntity(e, bodyColor) {
  if (e.dead || e.hp <= 0) return;
  const now = performance.now();

  // Dash ring (player only)
  if (!e.isBot) {
    const dashPct = Math.max(0, Math.min(1, (now - (e.dashCd - DASH_CD)) / DASH_CD));
    const ready   = now >= e.dashCd;
    ctx.beginPath();
    ctx.arc(e.x, e.y, e.radius+6, -Math.PI/2, -Math.PI/2 + Math.PI*2*dashPct);
    ctx.strokeStyle = ready ? 'rgba(100,220,255,0.9)' : 'rgba(60,100,180,0.5)';
    ctx.lineWidth = 2; ctx.lineCap = 'butt'; ctx.stroke();
  }

  // Shadow
  ctx.save(); ctx.globalAlpha=0.22; ctx.fillStyle='#000';
  ctx.beginPath(); ctx.ellipse(e.x+3,e.y+3,e.radius,e.radius*0.72,0,0,Math.PI*2); ctx.fill();
  ctx.restore();

  // Body
  ctx.fillStyle = bodyColor;
  ctx.beginPath(); ctx.arc(e.x,e.y,e.radius,0,Math.PI*2); ctx.fill();

  // Aim arc (player only)
  if (!e.isBot) {
    ctx.beginPath();
    ctx.arc(e.x, e.y, e.radius+60, e.aimAngle-Math.PI/8, e.aimAngle+Math.PI/8);
    ctx.strokeStyle = 'rgba(255,255,255,0.82)'; ctx.lineWidth=2.5; ctx.lineCap='round'; ctx.stroke();
  }

  // Weapon visual
  const wep = WEAPONS[e.weapon];
  if (e.weapon === 'pickaxe') {
    drawPickaxeSwing(e);
    ctx.strokeStyle='#f0c83c'; ctx.lineWidth=3; ctx.lineCap='round';
    ctx.beginPath();
    ctx.moveTo(e.x+Math.cos(e.aimAngle)*e.radius*0.4, e.y+Math.sin(e.aimAngle)*e.radius*0.4);
    ctx.lineTo(e.x+Math.cos(e.aimAngle)*(e.radius+6), e.y+Math.sin(e.aimAngle)*(e.radius+6));
    ctx.stroke();
  } else if (wep?.bLen > 0) {
    ctx.strokeStyle='#fff'; ctx.lineWidth=wep.bW; ctx.lineCap='round';
    ctx.beginPath();
    ctx.moveTo(e.x+Math.cos(e.aimAngle)*e.radius*0.4, e.y+Math.sin(e.aimAngle)*e.radius*0.4);
    ctx.lineTo(e.x+Math.cos(e.aimAngle)*(e.radius+wep.bLen), e.y+Math.sin(e.aimAngle)*(e.radius+wep.bLen));
    ctx.stroke();
  }

  // Potion-drinking ring (player only)
  if (!e.isBot && usingPotion) {
    const p = Math.min(1, (now - usingPotion.startTime) / usingPotion.duration);
    ctx.beginPath();
    ctx.arc(e.x, e.y, e.radius+11, -Math.PI/2, -Math.PI/2 + Math.PI*2*p);
    ctx.strokeStyle = usingPotion.type === 'mini' ? '#88ccff' : '#bb88ff';
    ctx.lineWidth = 4; ctx.lineCap = 'round'; ctx.stroke();
  }

  // HP + shield bars
  const bw=e.radius*2.6, bh=5, bx=e.x-bw/2;
  const hasShield = (e.shield||0) > 0;
  const hpY = e.y - e.radius - (hasShield ? 19 : 13);

  // HP bar
  ctx.fillStyle='#1a1a1a'; ctx.fillRect(bx,hpY,bw,bh);
  const pct=Math.max(0,e.hp/100);
  ctx.fillStyle=pct>0.5?'#33cc55':pct>0.25?'#ddaa22':'#dd3333';
  ctx.fillRect(bx,hpY,bw*pct,bh);

  // Shield bar (just above HP, scaled to 150 max)
  if (hasShield) {
    const sy = hpY + bh + 1;
    ctx.fillStyle='#1a1a1a'; ctx.fillRect(bx,sy,bw,4);
    ctx.fillStyle='#55aaff';
    ctx.fillRect(bx,sy,bw*Math.min(1,e.shield/SHIELD_MAX),4);
  }
}

function drawWeaponHUD() {
  const slotW=76, slotH=44, gap=4;
  const total=WEAPON_ORDER.length*slotW+(WEAPON_ORDER.length-1)*gap;
  const sx=(W-total)/2, sy=H-slotH-8;
  const now=performance.now();

  WEAPON_ORDER.forEach((id,i) => {
    const wep    = WEAPONS[id];
    const x      = sx+i*(slotW+gap);
    const active = player.weapon===id;
    const ws     = player.ammo[id];
    const reloading = now < ws.reloadEnd;
    const relPct    = reloading ? 1-(ws.reloadEnd-now)/wep.reloadTime : 0;

    ctx.fillStyle   = active ? 'rgba(30,55,100,0.9)' : 'rgba(0,0,0,0.65)';
    ctx.strokeStyle = active ? '#88aaff' : '#333';
    ctx.lineWidth   = active ? 2 : 1;
    ctx.beginPath(); ctx.roundRect(x,sy,slotW,slotH,4); ctx.fill(); ctx.stroke();

    // Slot number
    ctx.fillStyle=active?'#aabbff':'#444'; ctx.font='9px monospace';
    ctx.fillText(String(i+1), x+4, sy+11);

    // Weapon name
    ctx.fillStyle=active?'#fff':'#777';
    ctx.font=`${active?'bold ':' '}12px monospace`;
    ctx.textAlign='center';
    ctx.fillText(wep.name, x+slotW/2, sy+26);

    // Ammo / reload
    if (id==='pickaxe') {
      ctx.fillStyle='#555'; ctx.font='10px monospace';
      ctx.fillText('∞', x+slotW/2, sy+39);
    } else if (reloading) {
      ctx.fillStyle='rgba(0,0,0,0.5)';
      ctx.fillRect(x+4, sy+slotH-9, slotW-8, 5);
      ctx.fillStyle='#ffcc44';
      ctx.fillRect(x+4, sy+slotH-9, (slotW-8)*relPct, 5);
    } else {
      const col = ws.count <= wep.magSize*0.3 ? '#ff6644' : '#888';
      ctx.fillStyle=col; ctx.font='10px monospace';
      ctx.fillText(`${ws.count}/${wep.magSize}`, x+slotW/2, sy+39);
    }
    ctx.textAlign='left';
  });
}

// ═══════════════════════════════════════════════════════════════════════════════
// MAIN RENDER
// ═══════════════════════════════════════════════════════════════════════════════
function render() {
  if (gameMode === 'menu' || !player) return;
  // Screen shake
  const sx = shake.intensity > 0.1 ? (Math.random()*2-1)*shake.intensity : 0;
  const sy = shake.intensity > 0.1 ? (Math.random()*2-1)*shake.intensity : 0;
  ctx.save(); ctx.translate(sx, sy);

  // Background
  ctx.fillStyle='#181818'; ctx.fillRect(0,0,W,H);

  // Grid
  ctx.strokeStyle='#252525'; ctx.lineWidth=1;
  for (let x=0;x<=W;x+=CELL) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke(); }
  for (let y=0;y<=H;y+=CELL) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke(); }

  // Storm vignette
  if (gameMode==='survival' && storm.radius < W) {
    const grad = ctx.createRadialGradient(storm.cx,storm.cy,storm.radius*0.75, storm.cx,storm.cy,Math.max(W,H)*1.4);
    grad.addColorStop(0,'rgba(0,0,0,0)');
    grad.addColorStop(0.3,'rgba(200,50,0,0.28)');
    grad.addColorStop(1,'rgba(200,50,0,0.72)');
    ctx.fillStyle=grad; ctx.fillRect(0,0,W,H);
    ctx.beginPath(); ctx.arc(storm.cx,storm.cy,storm.radius,0,Math.PI*2);
    ctx.strokeStyle=`rgba(255,110,0,${0.6+0.3*Math.sin(Date.now()*0.005)})`; ctx.lineWidth=4; ctx.stroke();
  }

  // Walls
  for (const [key, wall] of Object.entries(walls)) {
    const color=wallBodyColor(wall.hp);
    ctx.fillStyle=color;
    for (const seg of wallSegs(key,wall)) ctx.fillRect(seg.x,seg.y,seg.w,seg.h);
    if (wall.state==='window') {
      const {type,a,b}=keyMeta(key);
      ctx.save(); ctx.strokeStyle=color; ctx.lineWidth=1; ctx.globalAlpha=0.4; ctx.setLineDash([3,5]);
      ctx.beginPath();
      if (type==='h') { ctx.moveTo(a*CELL+CELL*WIN_FRAC,b*CELL); ctx.lineTo(a*CELL+CELL*(1-WIN_FRAC),b*CELL); }
      else { ctx.moveTo(a*CELL,b*CELL+CELL*WIN_FRAC); ctx.lineTo(a*CELL,b*CELL+CELL*(1-WIN_FRAC)); }
      ctx.stroke(); ctx.restore();
    }
    drawWallCracks(key,wall);
    drawWallHealthBar(key,wall);
  }

  // Build preview
  if (!gameOver) {
    const {cx,cy}=entityCell(player);
    const key=edgeKey(cx,cy,angleToSide(player.aimAngle));
    const can=gameMode==='freebuild'||player.materials>=MAT_COST;
    if (!walls[key]) {
      const rect=wallRect(key);
      ctx.fillStyle  =can?'rgba(80,160,255,0.2)':'rgba(255,70,70,0.2)';
      ctx.strokeStyle=can?'rgba(80,160,255,0.7)':'rgba(255,70,70,0.7)';
      ctx.lineWidth=2; ctx.fillRect(rect.x,rect.y,rect.w,rect.h); ctx.strokeRect(rect.x,rect.y,rect.w,rect.h);
    }
  }

  // Explosions
  for (const ex of explosions) {
    const t = 1 - ex.life/ex.maxLife;
    const r = ex.maxR*(0.2+0.8*t);
    const alpha = Math.pow(1-t,0.7);
    const grad = ctx.createRadialGradient(ex.x,ex.y,0,ex.x,ex.y,r);
    grad.addColorStop(0,`rgba(255,255,200,${alpha*0.95})`);
    grad.addColorStop(0.3,`rgba(255,140,30,${alpha*0.8})`);
    grad.addColorStop(0.7,`rgba(255,50,0,${alpha*0.5})`);
    grad.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=grad; ctx.beginPath(); ctx.arc(ex.x,ex.y,r,0,Math.PI*2); ctx.fill();
  }

  // Bullet trails
  ctx.lineCap='round';
  for (const b of bullets) {
    ctx.strokeStyle=b.col; ctx.lineWidth=b.sz*2;
    ctx.globalAlpha=0.55;
    ctx.beginPath(); ctx.moveTo(b.prevX,b.prevY); ctx.lineTo(b.x,b.y); ctx.stroke();
    ctx.globalAlpha=1;
    ctx.fillStyle=b.col; ctx.beginPath(); ctx.arc(b.x,b.y,b.sz,0,Math.PI*2); ctx.fill();
  }

  // Afterimages
  ctx.save();
  for (const ai of afterimages) {
    ctx.globalAlpha=ai.life/ai.maxLife*0.45;
    ctx.fillStyle='#5599ff';
    ctx.beginPath(); ctx.arc(ai.x,ai.y,P_RADIUS*0.9,0,Math.PI*2); ctx.fill();
  }
  ctx.restore();

  // Entities
  drawEntity(player,'#4488ff');
  for (const b of bots) {
    const col = (gameMode==='online') ? (b.team===myTeam?'#44aaff':'#ff5533') : '#ff5533';
    drawEntity(b, col);
    if (gameMode==='online' && b.isRemote && !b.dead && b.username) {
      ctx.fillStyle='#aaa'; ctx.font='11px monospace'; ctx.textAlign='center';
      ctx.fillText(b.username, b.x, b.y - b.radius - 20);
      ctx.textAlign='left';
    }
  }
  if (gameMode==='online' && currentProfile) {
    ctx.fillStyle='#5599ff'; ctx.font='11px monospace'; ctx.textAlign='center';
    ctx.fillText(currentProfile.username, player.x, player.y - player.radius - 20);
    ctx.textAlign='left';
  }

  // Particles
  ctx.save();
  for (const p of particles) {
    ctx.globalAlpha=p.life/p.maxLife;
    ctx.fillStyle=p.color;
    ctx.beginPath(); ctx.arc(p.x,p.y,2.5,0,Math.PI*2); ctx.fill();
  }
  ctx.restore();

  // Floating texts
  ctx.save();
  for (const ft of floatingTexts) {
    ctx.globalAlpha=ft.life/ft.maxLife;
    ctx.fillStyle=ft.color;
    ctx.font=`bold ${ft.size}px monospace`;
    ctx.textAlign='center';
    ctx.fillText(ft.text,ft.x,ft.y);
  }
  ctx.textAlign='left'; ctx.restore();

  // Banner text (center canvas)
  if (bannerText && bannerText.life > 0) {
    const alpha=Math.min(1, bannerText.life/bannerText.maxLife * 3);
    ctx.save(); ctx.globalAlpha=alpha*0.9;
    ctx.fillStyle=bannerText.color;
    ctx.font=`bold ${bannerText.size}px monospace`;
    ctx.textAlign='center';
    ctx.shadowColor=bannerText.color; ctx.shadowBlur=20;
    ctx.fillText(bannerText.text, W/2, H/2-30);
    ctx.restore(); ctx.textAlign='left';
  }

  // Combo display
  if (combo >= 2) {
    ctx.save();
    const label=COMBO_LABELS[Math.min(combo,COMBO_LABELS.length-1)] || `${combo}x`;
    const pulse=0.85+0.15*Math.sin(Date.now()*0.012);
    ctx.globalAlpha=pulse;
    ctx.fillStyle='#ffcc00';
    ctx.font=`bold ${15+Math.min(combo,8)}px monospace`;
    ctx.textAlign='center';
    ctx.shadowColor='#ffcc00'; ctx.shadowBlur=12;
    ctx.fillText(label, W/2, 38);
    ctx.restore(); ctx.textAlign='left';
  }

  ctx.restore(); // un-shake

  // ── Screen flashes (no shake) ──────────────────────────────────────────────
  if (playerHitFlash > 0) {
    ctx.fillStyle=`rgba(255,0,0,${playerHitFlash*0.32})`; ctx.fillRect(0,0,W,H);
  }
  if (killFlash > 0) {
    ctx.fillStyle=`rgba(255,255,255,${killFlash*0.22})`; ctx.fillRect(0,0,W,H);
  }

  // ── HUD ───────────────────────────────────────────────────────────────────
  // Player status panel
  ctx.fillStyle='rgba(0,0,0,0.6)'; ctx.fillRect(10,10,210,74);

  // HP bar
  const hudX=20, hudW=140;
  ctx.fillStyle='#888'; ctx.font='10px monospace';
  ctx.fillText('HP', hudX, 26);
  ctx.fillStyle='#101410'; ctx.fillRect(hudX+26, 18, hudW, 9);
  const hpFrac=Math.max(0,player.hp/100);
  ctx.fillStyle=hpFrac>0.5?'#33cc55':hpFrac>0.25?'#ddaa22':'#dd3333';
  ctx.fillRect(hudX+26, 18, hudW*hpFrac, 9);
  ctx.fillStyle='#ccc'; ctx.font='9px monospace';
  ctx.fillText(Math.max(0,Math.ceil(player.hp)), hudX+26+hudW+6, 26);

  // Shield bar
  ctx.fillStyle='#668'; ctx.font='10px monospace';
  ctx.fillText('SH', hudX, 42);
  ctx.fillStyle='#0a0e18'; ctx.fillRect(hudX+26, 34, hudW, 9);
  ctx.fillStyle='#55aaff';
  ctx.fillRect(hudX+26, 34, hudW*Math.min(1,(player.shield||0)/SHIELD_MAX), 9);
  ctx.fillStyle='#9cf'; ctx.font='9px monospace';
  ctx.fillText(Math.ceil(player.shield||0), hudX+26+hudW+6, 42);

  // Materials + items row
  ctx.font='10px monospace';
  const matStr = gameMode==='freebuild' ? '∞' : `${Math.floor(player.materials)}`;
  ctx.fillStyle='#88bbff'; ctx.fillText(`◆ ${matStr}`, hudX, 60);
  ctx.fillStyle='#88ccff'; ctx.fillText(`◢ ${player.minis}`, hudX+56, 60);
  ctx.fillStyle='#bb88ff'; ctx.fillText(`◍ ${player.bigPots}`, hudX+104, 60);

  // Dash pip
  const dashReady = performance.now() >= player.dashCd;
  ctx.fillStyle = dashReady ? '#44ccff' : '#2a3a4a';
  ctx.beginPath(); ctx.arc(hudX+5, 74, 4, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle=dashReady?'#aaeeff':'#445566'; ctx.font='9px monospace';
  ctx.fillText('DASH', hudX+14, 77);

  // Kill feed
  killfeed.slice(0,4).forEach((kf,i) => {
    const alpha=Math.min(1, kf.life/1000);
    ctx.save(); ctx.globalAlpha=alpha;
    ctx.fillStyle='rgba(0,0,0,0.55)';
    ctx.fillRect(W-252, 10+i*22, 242, 18);
    ctx.fillStyle='#88ff99'; ctx.font='11px monospace';
    ctx.fillText(kf.text, W-248, 22+i*22);
    ctx.restore();
  });

  // Bot HP (vsbot)
  if (gameMode==='vsbot' && bots[0] && !bots[0].dead) {
    ctx.fillStyle='rgba(0,0,0,0.55)'; ctx.fillRect(W-175,H-58,165,48);
    ctx.fillStyle='#ff5533'; ctx.font='13px monospace';
    ctx.fillText(`BOT HP  ${Math.max(0,Math.ceil(bots[0].hp))}`, W-165, H-40);
    ctx.fillStyle='#666'; ctx.fillText(`[${bots[0].weapon.toUpperCase()}]`, W-165, H-22);
  }

  // Survival info
  if (gameMode==='survival') {
    const alive=bots.filter(b=>!b.dead).length;
    ctx.fillStyle='rgba(0,0,0,0.55)'; ctx.fillRect(W/2-80,10,160,48);
    ctx.fillStyle='#fff'; ctx.font='bold 18px monospace'; ctx.textAlign='center';
    ctx.fillText(`WAVE ${wave}`, W/2, 30);
    ctx.font='12px monospace'; ctx.fillStyle='#888';
    if (waveState==='active') ctx.fillText(`${alive} remaining`, W/2, 48);
    else {
      const sec=Math.ceil(waveTimer/1000);
      ctx.fillStyle='#66ff99'; ctx.fillText(`Next wave in ${sec}…`, W/2, 48);
    }
    ctx.textAlign='left';
    // Storm warning
    const sd=Math.sqrt(dist2(player.x,player.y,storm.cx,storm.cy));
    if (sd > storm.radius-60) {
      ctx.save(); ctx.globalAlpha=0.7+0.3*Math.sin(Date.now()*0.008);
      ctx.fillStyle='#ff6600'; ctx.font='bold 13px monospace'; ctx.textAlign='center';
      ctx.fillText('⚠ STORM CLOSING IN', W/2, H-70); ctx.restore(); ctx.textAlign='left';
    }
  }

  // Free build info
  if (gameMode==='freebuild') {
    ctx.fillStyle='rgba(0,0,0,0.55)'; ctx.fillRect(W-160,10,150,30);
    ctx.fillStyle='#66dd99'; ctx.font='12px monospace';
    ctx.fillText(`WALLS: ${Object.keys(walls).length}`, W-150, 28);
    ctx.fillStyle='#555'; ctx.font='10px monospace';
    ctx.fillText('C: clear all', W-150, 44);
  }

  // Weapon HUD
  drawWeaponHUD();
}

// ═══════════════════════════════════════════════════════════════════════════════
// MAIN LOOP
// ═══════════════════════════════════════════════════════════════════════════════
function loop(timestamp) {
  const rawDt    = Math.min(timestamp - lastTime, 50);
  lastTime       = timestamp;

  // Slow-mo timer (real time)
  if (slowMoTimer > 0) {
    slowMoTimer -= rawDt;
    if (slowMoTimer <= 0) { slowMoTimer=0; timeScale=1.0; }
  }
  const scaledDt = rawDt * timeScale;

  // Shake decay (real time feels better)
  shake.intensity = Math.max(0, shake.intensity * Math.pow(0.88, rawDt/FRAME_MS));

  // Flash decay
  playerHitFlash = Math.max(0, playerHitFlash - rawDt*0.004);
  killFlash      = Math.max(0, killFlash      - rawDt*0.005);

  // Combo expiry (real time)
  if (combo > 0 && performance.now() - lastComboHit > COMBO_RESET) combo=0;

  // Kill feed decay (real time)
  killfeed = killfeed.map(k => ({ ...k, life: k.life-rawDt })).filter(k=>k.life>0);

  // Banner decay
  if (bannerText) bannerText.life -= rawDt;

  if (gameMode !== 'menu' && !paused) {
    if (!gameOver) {
      updatePlayer(scaledDt);
      if (gameMode === 'online') interpRemote(scaledDt);
      else for (const b of bots) updateBot(b, scaledDt);
      updateBullets();
      updateWalls(rawDt);  // regen always real-time
      // Particles
      particles = particles.map(p => {
        const decay = Math.pow(0.88, scaledDt/FRAME_MS);
        return { ...p, x:p.x+p.vx*scaledDt/FRAME_MS, y:p.y+p.vy*scaledDt/FRAME_MS, vx:p.vx*decay, vy:p.vy*decay, life:p.life-scaledDt/FRAME_MS };
      }).filter(p=>p.life>0);
    } else {
      particles = particles.map(p => ({ ...p, x:p.x+p.vx, y:p.y+p.vy, vx:p.vx*0.9, vy:p.vy*0.9, life:p.life-1 })).filter(p=>p.life>0);
    }

    // Afterimages (real time)
    afterimages = afterimages.map(ai => ({ ...ai, life:ai.life-1 })).filter(ai=>ai.life>0);

    // Floating texts
    floatingTexts = floatingTexts.map(ft => ({
      ...ft, y:ft.y+ft.vy*scaledDt/FRAME_MS, life:ft.life-scaledDt/FRAME_MS
    })).filter(ft=>ft.life>0);

    // Explosions
    explosions = explosions.map(ex => ({ ...ex, life:ex.life-rawDt })).filter(ex=>ex.life>0);

    if (gameMode==='survival' && !gameOver) updateSurvival(rawDt);
    render();
  }
  requestAnimationFrame(loop);
}

// INIT
// ═══════════════════════════════════════════════════════════════════════════════
let lastMode = 'vsbot';

function init(mode) {
  gameMode = mode; lastMode = mode;
  walls={};bullets=[];particles=[];explosions=[];afterimages=[];floatingTexts=[];killfeed=[];
  gameOver=false; timeScale=1.0; slowMoTimer=0;
  shake.intensity=0; playerHitFlash=0; killFlash=0;
  combo=0; totalKills=0; bannerText=null; usingPotion=null;

  player = makeEntity(CELL*2.5, H/2, false);
  virtualMouse.x = player.x + 120;   // start aiming right toward center
  virtualMouse.y = player.y;
  bots   = [];

  if (mode==='vsbot') {
    const diff = botDifficulty;
    const b = makeEntity(W-CELL*2.5, H/2, true, diff);
    b.aimAngle = Math.PI;
    b.shield = diff==='hard' ? 100 : diff==='medium' ? 50 : 0;
    const weps = BOT_DIFF[diff].weps;
    b.weapon = weps[Math.floor(Math.random()*weps.length)];
    bots = [b];
  } else if (mode==='survival') {
    wave=0; waveState='between'; waveTimer=2500;
    storm={ cx:W/2, cy:H/2, radius:9999 };
    spawnBanner('SURVIVAL MODE', '#ff9933', 28, 2500);
  } else if (mode==='freebuild') {
    player.materials = Infinity;
  } else if (mode==='online') {
    remotePlayers = {};
  }

  document.getElementById('menu').classList.remove('show');
  document.getElementById('result').classList.remove('show');
}

function showMenu() {
  gameMode='menu';
  document.exitPointerLock();
  cleanupOnline();
  document.getElementById('menu').classList.add('show');
  document.getElementById('result').classList.remove('show');
  document.getElementById('in-lobby').classList.remove('show');
  document.getElementById('lobby-screen').classList.remove('show');
  document.getElementById('auth').classList.remove('show');
}

document.addEventListener('keydown', e => {
  // Settings: intercept key for rebinding
  if (listeningFor) {
    e.preventDefault();
    if (e.code !== 'Escape') {
      keybinds[listeningFor] = e.code;
      saveKeybinds();
    }
    listeningFor = null;
    renderSettingsUI();
    return;
  }

  keys[e.code] = true;
  if (gameMode === 'menu' || document.getElementById('settings').classList.contains('show')) return;
  if (paused) return;

  const kb = keybinds;
  if (e.code === kb.edit)   tryEdit(player);           // toggle window ↔ full
  if (e.code === kb.reset)  tryEdit(player, 'full');   // force full

  if (e.code === kb.weapon1) player.weapon = WEAPON_ORDER[0];
  if (e.code === kb.weapon2) player.weapon = WEAPON_ORDER[1];
  if (e.code === kb.weapon3) player.weapon = WEAPON_ORDER[2];
  if (e.code === kb.weapon4) player.weapon = WEAPON_ORDER[3];
  if (e.code === kb.weapon5) player.weapon = WEAPON_ORDER[4];
  if (e.code === kb.weapon6) player.weapon = WEAPON_ORDER[5];

  if (e.code === kb.clear && gameMode === 'freebuild') { walls = {}; bullets = []; }

  if (e.code === kb.mini)   startPotion('mini');
  if (e.code === kb.bigpot) startPotion('big');

  if (e.code === kb.reload) {
    const ws = player.ammo[player.weapon], wep = WEAPONS[player.weapon];
    if (ws && wep.magSize !== Infinity && ws.count < wep.magSize) {
      ws.reloadEnd = performance.now() + wep.reloadTime;
      ws.count     = wep.magSize;
      spawnFloat(player.x, player.y-22, 'RELOAD', '#ffcc44', 12);
    }
  }

  if (e.code === kb.dash) {
    e.preventDefault();
    const now = performance.now();
    if (!player.dead && now >= player.dashCd) {
      usingPotion = null;   // dashing interrupts drinking
      let dx=0, dy=0;
      if (keys[kb.up]   || keys['ArrowUp'])    dy -= 1;
      if (keys[kb.down] || keys['ArrowDown'])  dy += 1;
      if (keys[kb.left] || keys['ArrowLeft'])  dx -= 1;
      if (keys[kb.right]|| keys['ArrowRight']) dx += 1;
      if (dx===0 && dy===0) { dx=Math.cos(player.aimAngle); dy=Math.sin(player.aimAngle); }
      const m = Math.sqrt(dx*dx+dy*dy);
      player.dashVx = dx/m*DASH_SPD; player.dashVy = dy/m*DASH_SPD;
      player.dashEnd = now + DASH_DUR;
      player.dashCd  = now + DASH_CD;
      doShake(3);
      spawnParticles(player.x, player.y, '#88aaff', 8, 0.8);
    }
  }
  if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.code)) e.preventDefault();
});
document.addEventListener('keyup', e => { keys[e.code]=false; });

canvas.addEventListener('mousemove', e => {
  if (document.pointerLockElement === canvas) {
    // Shift world-space cursor — X and Y both move it naturally
    virtualMouse.x += e.movementX * 1.4;
    virtualMouse.y += e.movementY * 1.4;
  } else {
    const r = canvas.getBoundingClientRect();
    mouse.x = (e.clientX - r.left) * (W / r.width);
    mouse.y = (e.clientY - r.top)  * (H / r.height);
  }
});
canvas.addEventListener('mousedown', e => { mouse.buttons=e.buttons; e.preventDefault(); });
canvas.addEventListener('mouseup',   e => { mouse.buttons=e.buttons; });
canvas.addEventListener('contextmenu', e => e.preventDefault());
canvas.addEventListener('wheel', e => {
  e.preventDefault();
  if (gameMode==='menu') return;
  const i=WEAPON_ORDER.indexOf(player.weapon);
  player.weapon=WEAPON_ORDER[(i+(e.deltaY>0?1:-1)+WEAPON_ORDER.length)%WEAPON_ORDER.length];
},{passive:false});
