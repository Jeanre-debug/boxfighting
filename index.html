// ─── Network send helper ──────────────────────────────────────────────────────
function netSend(event, payload) {
  if (!lobbyChannel) return;
  lobbyChannel.send({ type:'broadcast', event, payload });
}

// ─── Remote player interpolation ─────────────────────────────────────────────
function interpRemote(scaledDt) {
  const t = Math.min(1, 0.22 * scaledDt / FRAME_MS);
  for (const rp of bots) {
    if (rp.dead || !rp.targetX) continue;
    rp.x += (rp.targetX - rp.x) * t;
    rp.y += (rp.targetY - rp.y) * t;
  }
}

// ─── Cleanup ─────────────────────────────────────────────────────────────────
function cleanupOnline() {
  if (stateInterval) { clearInterval(stateInterval); stateInterval = null; }
  if (lobbyChannel)  { sb.removeChannel(lobbyChannel); lobbyChannel = null; }
  currentLobby = null; remotePlayers = {}; amIReady = false;
  document.getElementById('online-indicator').classList.remove('show');
}

// ─── Auth ─────────────────────────────────────────────────────────────────────
async function loadProfile() {
  const { data, error } = await sb.from('profiles').select().eq('id', currentUser.id).single();
  if (error || !data) { setAuthErr('Profile not found — try signing up again.'); return null; }
  currentProfile = data;
  document.getElementById('online-username').textContent = data.username;
  return data;
}

async function doSignIn() {
  const email = document.getElementById('auth-email').value.trim();
  const pass  = document.getElementById('auth-pass').value;
  if (!email || !pass) { setAuthErr('Enter your email and password.'); return; }
  const btn = document.getElementById('btn-auth-submit');
  btn.textContent = 'SIGNING IN…'; btn.disabled = true;
  setAuthErr('');

  // Hard timeout — if Supabase hangs, bail after 15s
  const timer = setTimeout(() => {
    btn.textContent = 'SIGN IN'; btn.disabled = false;
    setAuthErr('Connection timed out — check your network and try again.');
  }, 15000);

  try {
    const { data, error } = await sb.auth.signInWithPassword({ email, password: pass });
    clearTimeout(timer);
    if (error) { setAuthErr(error.message); return; }
    currentUser = data.user;
    // Pull username directly from JWT metadata — no extra DB call needed
    const username = data.user.user_metadata?.username || data.user.email.split('@')[0];
    currentProfile = { id: data.user.id, username };
    document.getElementById('online-username').textContent = username;
    document.getElementById('auth').classList.remove('show');
    document.getElementById('lobby-screen').classList.add('show');
  } catch (e) {
    clearTimeout(timer);
    setAuthErr(e.message || 'Something went wrong — try again.');
  } finally {
    btn.textContent = 'SIGN IN'; btn.disabled = false;
  }
}

async function doSignUp() {
  const email = document.getElementById('auth-email').value.trim();
  const pass  = document.getElementById('auth-pass').value;
  const uname = document.getElementById('auth-user').value.trim().toLowerCase();
  setAuthErr('');
  if (uname.length < 3 || uname.length > 16 || !/^[a-z0-9_]+$/.test(uname)) {
    setAuthErr('Username: 3–16 chars, letters/numbers/underscore'); return;
  }
  const btn = document.getElementById('btn-auth-submit');
  btn.textContent = 'CREATING…'; btn.disabled = true;

  try {
  // Check username availability before creating auth user
  const { data: taken } = await sb.from('profiles').select('id').eq('username', uname).maybeSingle();
  if (taken) { setAuthErr('Username already taken'); return; }

  // Pass username in metadata — trigger will create profile row instantly
  const { data, error } = await sb.auth.signUp({
    email, password: pass,
    options: {
      data: { username: uname },
      emailRedirectTo: window.location.origin + '/',
    },
  });
  if (error) { setAuthErr(error.message); return; }

  currentUser = data.user;

  if (!data.session) {
    document.getElementById('auth-err').style.color = '#4ade80';
    document.getElementById('auth-err').textContent = 'Account created! Check your email to confirm, then sign in.';
    return;
  }
  await afterAuth(data.user);
  } finally {
    btn.textContent = 'CREATE ACCOUNT'; btn.disabled = false;
  }
}

async function afterAuth(user) {
  currentUser = user;
  const username = user.user_metadata?.username || user.email.split('@')[0];
  currentProfile = { id: user.id, username };
  document.getElementById('online-username').textContent = username;
  document.getElementById('auth').classList.remove('show');
  document.getElementById('lobby-screen').classList.add('show');
}

function setAuthErr(msg) { document.getElementById('auth-err').textContent = msg; }
function setLobbyErr(msg){ document.getElementById('lobby-err').textContent = msg; }

// ─── Auth state listener ──────────────────────────────────────────────────────
sb.auth.onAuthStateChange(async (event, session) => {
  if (event === 'SIGNED_IN' && session && !currentProfile) {
    await afterAuth(session.user);
  }
  if (event === 'SIGNED_OUT') { currentUser = null; currentProfile = null; }
});

// ─── Lobby ────────────────────────────────────────────────────────────────────
function rndCode() {
  const ch = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  let s = '';
  for (let i=0;i<4;i++) s += ch[Math.floor(Math.random()*ch.length)];
  return s;
}

async function createLobby() {
  setLobbyErr('');
  const code = rndCode();
  const { data: lobby, error } = await sb.from('lobbies')
    .insert({ code, mode: lobbyModeSelected, host_id: currentUser.id })
    .select().single();
  if (error) { setLobbyErr(error.message); return; }
  await joinLobbyById(lobby.id, 0);
}

async function joinByCode() {
  setLobbyErr('');
  const code = document.getElementById('join-code-input').value.trim().toUpperCase();
  if (code.length !== 4) { setLobbyErr('Enter a 4-character code'); return; }
  const { data: lobby } = await sb.from('lobbies').select().eq('code', code).eq('status','waiting').single();
  if (!lobby) { setLobbyErr('Lobby not found or already started'); return; }
  // Determine team: count members per team
  const { data: members } = await sb.from('lobby_members').select().eq('lobby_id', lobby.id);
  const maxPlayers = lobby.mode === '2v2' ? 4 : 2;
  if (members && members.length >= maxPlayers) { setLobbyErr('Lobby is full'); return; }
  const team1Count = members ? members.filter(m => m.team === 1).length : 0;
  const team0Count = members ? members.filter(m => m.team === 0).length : 0;
  const team = team0Count <= team1Count ? 0 : 1;
  await joinLobbyById(lobby.id, team);
}

async function joinLobbyById(lobbyId, team) {
  const { data: lobby } = await sb.from('lobbies').select().eq('id', lobbyId).single();
  const { error } = await sb.from('lobby_members')
    .upsert({ lobby_id: lobbyId, player_id: currentUser.id, team, ready: false }, { onConflict: 'lobby_id,player_id' });
  if (error) { setLobbyErr(error.message); return; }
  currentLobby = lobby; myTeam = team; amIReady = false;
  document.getElementById('lobby-screen').classList.remove('show');
  document.getElementById('lobby-code-disp').textContent = lobby.code;
  document.getElementById('mode-disp').textContent = lobby.mode.toUpperCase();
  document.getElementById('in-lobby').classList.add('show');
  subscribeLobby(lobbyId);
}

async function leaveLobby() {
  if (!currentLobby) return;
  await sb.from('lobby_members').delete().eq('lobby_id', currentLobby.id).eq('player_id', currentUser.id);
  cleanupOnline();
  document.getElementById('in-lobby').classList.remove('show');
  document.getElementById('lobby-screen').classList.add('show');
}

async function toggleReady() {
  amIReady = !amIReady;
  document.getElementById('btn-ready').textContent = amIReady ? 'UNREADY' : 'READY';
  document.getElementById('btn-ready').style.background = amIReady ? 'rgba(20,80,40,0.9)' : '';
  await sb.from('lobby_members').update({ ready: amIReady }).eq('lobby_id', currentLobby.id).eq('player_id', currentUser.id);
  if (lobbyChannel) await lobbyChannel.track({ userId: currentUser.id, username: currentProfile.username, team: myTeam, ready: amIReady });
}

// ─── Lobby realtime subscription ──────────────────────────────────────────────
function subscribeLobby(lobbyId) {
  if (lobbyChannel) sb.removeChannel(lobbyChannel);
  lobbyChannel = sb.channel(`lobby:${lobbyId}`, { config: { presence: { key: currentUser.id } } });

  lobbyChannel
    .on('presence', { event: 'sync' }, () => {
      const state = lobbyChannel.presenceState();
      renderLobbyPlayers(state);
      checkAllReady(state);
    })
    .on('broadcast', { event: 'game_start' }, ({ payload }) => handleGameStart(payload))
    .on('broadcast', { event: 'p_state' },   ({ payload }) => handleRemoteState(payload))
    .on('broadcast', { event: 'wall' },       ({ payload }) => handleWallEvent(payload))
    .on('broadcast', { event: 'bullet' },     ({ payload }) => handleRemoteBullet(payload))
    .on('broadcast', { event: 'hit' },        ({ payload }) => handleHitEvent(payload))
    .on('broadcast', { event: 'game_end' },   ({ payload }) => handleRemoteGameEnd(payload))
    .subscribe(async status => {
      if (status === 'SUBSCRIBED')
        await lobbyChannel.track({ userId: currentUser.id, username: currentProfile.username, team: myTeam, ready: false });
    });
}

// ─── Lobby UI ─────────────────────────────────────────────────────────────────
function renderLobbyPlayers(presence) {
  const list = document.getElementById('player-list');
  const mode = currentLobby?.mode || '1v1';
  const teams = mode === '2v2' ? [0, 1] : [0, 1];
  const players = Object.values(presence).map(p => p[0] || p);
  list.innerHTML = '';

  teams.forEach(team => {
    if (mode === '2v2') {
      const tl = document.createElement('div');
      tl.className = 'team-label';
      tl.textContent = `TEAM ${team === 0 ? 'A' : 'B'}`;
      list.appendChild(tl);
    }
    const slotsNeeded = mode === '2v2' ? 2 : 1;
    const teamPlayers = players.filter(p => p.team === team);
    for (let i = 0; i < slotsNeeded; i++) {
      const row = document.createElement('div'); row.className = 'player-row';
      if (teamPlayers[i]) {
        const dot = document.createElement('div');
        dot.className = 'player-dot';
        dot.style.background = team === myTeam ? '#4488ff' : '#ff5533';
        const name = document.createElement('span'); name.className = 'player-name';
        name.textContent = teamPlayers[i].username + (teamPlayers[i].userId === currentUser.id ? ' (you)' : '');
        const rdy = document.createElement('span');
        rdy.className = teamPlayers[i].ready ? 'player-ready' : 'player-wait';
        rdy.textContent = teamPlayers[i].ready ? '✓ READY' : '...';
        row.appendChild(dot); row.appendChild(name); row.appendChild(rdy);
      } else {
        const dot = document.createElement('div'); dot.className = 'player-dot'; dot.style.background = '#222';
        const name = document.createElement('span'); name.className = 'player-wait'; name.textContent = 'waiting…';
        row.appendChild(dot); row.appendChild(name);
      }
      list.appendChild(row);
    }
  });
}

function checkAllReady(presence) {
  const mode = currentLobby?.mode || '1v1';
  const required = mode === '2v2' ? 4 : 2;
  const players = Object.values(presence).map(p => p[0] || p);
  const allReady = players.length >= required && players.every(p => p.ready);
  if (!allReady) {
    document.getElementById('lobby-status-msg').textContent =
      `${players.length}/${required} players${players.length >= required ? ' — waiting for ready' : ''}`;
    return;
  }
  // Host starts the game
  if (currentLobby && currentUser.id === currentLobby.host_id) {
    document.getElementById('lobby-status-msg').textContent = 'Starting…';
    broadcastGameStart(players, mode);
  }
}

function broadcastGameStart(players, mode) {
  const spawnMap = {
    '1v1': [
      { team:0, x: CELL*2.5, y: H/2 },
      { team:1, x: W-CELL*2.5, y: H/2 },
    ],
    '2v2': [
      { team:0, x: CELL*2.5, y: H/3 },
      { team:0, x: CELL*2.5, y: H*2/3 },
      { team:1, x: W-CELL*2.5, y: H/3 },
      { team:1, x: W-CELL*2.5, y: H*2/3 },
    ],
  };
  const slots = spawnMap[mode];
  let t0 = 0, t1 = 0;
  const assignments = players.map(p => {
    const t = p.team;
    const slot = slots.find(s => s.team === t && slots.filter(s2=>s2.team===t).indexOf(s) === (t===0?t0:t1));
    if (t===0) t0++; else t1++;
    const sp = slots.filter(s=>s.team===t)[t===0?t0-1:t1-1] || slots.find(s=>s.team===t);
    return { userId: p.userId, username: p.username, team: p.team, spawnX: sp.x, spawnY: sp.y };
  });
  netSend('game_start', { assignments, mode });
}

// ─── Game start handler ───────────────────────────────────────────────────────
function handleGameStart({ assignments, mode }) {
  document.getElementById('in-lobby').classList.remove('show');
  const me = assignments.find(a => a.userId === currentUser.id);
  if (!me) return;
  myTeam = me.team;
  init('online');
  player.x = me.spawnX; player.y = me.spawnY;
  virtualMouse.x = me.spawnX + (me.team===0?120:-120);
  virtualMouse.y = me.spawnY;

  // Create remote player entities
  bots = [];
  remotePlayers = {};
  for (const a of assignments) {
    if (a.userId === currentUser.id) continue;
    const rp = makeEntity(a.spawnX, a.spawnY, true);
    rp.id = a.userId; rp.isRemote = true;
    rp.username = a.username; rp.team = a.team;
    rp.targetX = a.spawnX; rp.targetY = a.spawnY;
    bots.push(rp); remotePlayers[a.userId] = rp;
  }

  // Mark lobby active
  if (currentLobby && currentUser.id === currentLobby.host_id)
    sb.from('lobbies').update({ status:'active' }).eq('id', currentLobby.id).then(()=>{});

  stateInterval = setInterval(broadcastMyState, 50);
  canvas.requestPointerLock();

  const ind = document.getElementById('online-indicator');
  ind.textContent = `● ONLINE · ${mode}`;
  ind.classList.add('show');
}

// ─── State broadcast ──────────────────────────────────────────────────────────
function broadcastMyState() {
  if (!lobbyChannel || !player || gameOver) return;
  netSend('p_state', {
    userId: currentUser.id,
    x: player.x, y: player.y,
    aimAngle: player.aimAngle,
    hp: player.hp, shield: player.shield, weapon: player.weapon, dead: player.dead,
  });
}

// ─── Incoming handlers ────────────────────────────────────────────────────────
function handleRemoteState({ userId, x, y, aimAngle, hp, shield, weapon, dead }) {
  const rp = remotePlayers[userId]; if (!rp) return;
  rp.targetX = x; rp.targetY = y; rp.aimAngle = aimAngle;
  rp.hp = Math.max(0, hp); rp.shield = shield || 0; rp.weapon = weapon;
  if (dead && !rp.dead) {
    rp.dead = true; rp.hp = 0;
    spawnParticles(rp.x, rp.y, '#ff5533', 20);
    spawnParticles(rp.x, rp.y, '#ffcc00', 8);
    checkOnlineGameOver();
  }
}

function handleWallEvent({ t, key, state }) {
  if (t==='place')   { if (!walls[key]) walls[key] = { hp: WALL_START_HP, state:'full' }; }
  else if (t==='edit')    { if (walls[key]) walls[key].state = state; }
  else if (t==='destroy') { if (walls[key]) { const r=wallRect(key); spawnParticles(r.x+r.w/2,r.y+r.h/2,'#ffaa33',5); delete walls[key]; } }
}

function handleRemoteBullet({ x, y, vx, vy, wallDmg, playerDmg, col, sz, pierce, isRocket, range }) {
  bullets.push({
    x, y, prevX:x, prevY:y, vx, vy,
    owner: { isRemote:true }, life: range,
    wallDmg, playerDmg: 0, // local damage handled by hit events
    col, sz, pierce, isRocket,
  });
}

function handleHitEvent({ targetId, damage }) {
  if (targetId !== currentUser.id) return;
  applyDamage(player, damage, null);
}

function handleRemoteGameEnd({ winner }) {
  if (gameOver) return;
  gameOver = true; document.exitPointerLock(); cleanupOnline();
  const won = winner === currentUser.id;
  const el  = document.getElementById('resultText');
  el.textContent = won ? 'YOU WIN' : 'YOU LOSE';
  el.style.color = won ? '#44ff88' : '#ff4444';
  document.getElementById('resultSub').textContent = '';
  document.getElementById('result').classList.add('show');
}

// ─── Matchmaking ─────────────────────────────────────────────────────────────
let mmMode = '1v1', mmTimerInterval = null, mmSecs = 0, mmQueueCh = null;

function mmTick() {
  mmSecs++;
  const m = Math.floor(mmSecs/60), s = mmSecs%60;
  document.getElementById('mm-timer').textContent = `${m}:${s.toString().padStart(2,'0')}`;
  if (mmSecs >= 120) { cancelMatchmaking(); setLobbyErr('No match found — try again.'); }
}

async function startMatchmaking() {
  if (!currentUser || !currentProfile) return;
  setLobbyErr('');
  await sb.from('matchmaking_queue').delete().eq('player_id', currentUser.id);

  document.getElementById('lobby-screen').classList.remove('show');
  document.getElementById('mm-mode-label').textContent = mmMode.toUpperCase();
  document.getElementById('mm-status').textContent = 'Searching for players…';
  document.getElementById('mm-timer').textContent = '0:00';
  document.getElementById('matchmaking').classList.add('show');

  mmSecs = 0;
  mmTimerInterval = setInterval(mmTick, 1000);

  const { error } = await sb.from('matchmaking_queue').insert({ player_id: currentUser.id, mode: mmMode });
  if (error) { await cancelMatchmaking(); setLobbyErr(error.message); return; }

  const { data: lobbyId } = await sb.rpc('try_match', { p_mode: mmMode });
  if (lobbyId) { await enterMatchedLobby(lobbyId); return; }

  // Watch for match
  mmQueueCh = sb.channel(`mm_watch_${currentUser.id}`)
    .on('postgres_changes', {
      event: 'UPDATE', schema: 'public', table: 'matchmaking_queue',
      filter: `player_id=eq.${currentUser.id}`,
    }, async ({ new: row }) => { if (row.lobby_id) await enterMatchedLobby(row.lobby_id); })
    .subscribe();
}

async function cancelMatchmaking() {
  clearInterval(mmTimerInterval); mmTimerInterval = null;
  if (mmQueueCh) { sb.removeChannel(mmQueueCh); mmQueueCh = null; }
  await sb.from('matchmaking_queue').delete().eq('player_id', currentUser.id);
  document.getElementById('matchmaking').classList.remove('show');
  document.getElementById('lobby-screen').classList.add('show');
}

async function enterMatchedLobby(lobbyId) {
  clearInterval(mmTimerInterval); mmTimerInterval = null;
  if (mmQueueCh) { sb.removeChannel(mmQueueCh); mmQueueCh = null; }
  await sb.from('matchmaking_queue').delete().eq('player_id', currentUser.id);

  const { data: lobby  } = await sb.from('lobbies').select().eq('id', lobbyId).single();
  const { data: members} = await sb.from('lobby_members')
    .select('*, profiles(username)').eq('lobby_id', lobbyId);
  if (!lobby || !members) return;

  currentLobby = lobby;
  const me = members.find(m => m.player_id === currentUser.id);
  myTeam = me?.team ?? 0;

  document.getElementById('matchmaking').classList.remove('show');
  document.getElementById('mm-status').textContent = 'Match found!';

  subscribeToLobby(lobbyId);

  // Host starts the game after a short delay to let all clients subscribe
  if (currentUser.id === lobby.host_id) {
    setTimeout(() => {
      broadcastGameStart(
        members.map(m => ({ userId:m.player_id, username:m.profiles.username, team:m.team, ready:true })),
        lobby.mode
      );
    }, 3000);
  }
}

// ─── Online button wiring ─────────────────────────────────────────────────────
document.getElementById('btn-play-online').addEventListener('click', async () => {
  // Show auth screen immediately — don't wait for the network call
  document.getElementById('menu').classList.remove('show');
  document.getElementById('auth').classList.add('show');
  document.getElementById('auth-err').textContent = '';

  try {
    const { data: { user } } = await sb.auth.getUser();
    if (user) {
      currentUser = user;
      if (!currentProfile) await loadProfile();
      if (currentProfile) {
        document.getElementById('auth').classList.remove('show');
        document.getElementById('lobby-screen').classList.add('show');
      }
      // else: loadProfile showed an error, stay on auth
    }
    // else: not logged in, already on auth screen — do nothing
  } catch (e) {
    document.getElementById('auth-err').textContent = 'Connection error — check your network.';
  }
});

// Auth tabs
document.getElementById('tab-si').addEventListener('click', () => {
  document.getElementById('tab-si').classList.add('sel');
  document.getElementById('tab-su').classList.remove('sel');
  document.getElementById('auth-user').style.display = 'none';
  document.getElementById('btn-auth-submit').textContent = 'SIGN IN';
});
document.getElementById('tab-su').addEventListener('click', () => {
  document.getElementById('tab-su').classList.add('sel');
  document.getElementById('tab-si').classList.remove('sel');
  document.getElementById('auth-user').style.display = '';
  document.getElementById('btn-auth-submit').textContent = 'CREATE ACCOUNT';
});
document.getElementById('btn-auth-submit').addEventListener('click', () => {
  const isSignUp = document.getElementById('tab-su').classList.contains('sel');
  if (isSignUp) doSignUp(); else doSignIn();
});
document.getElementById('btn-auth-back').addEventListener('click', () => {
  document.getElementById('auth').classList.remove('show');
  document.getElementById('menu').classList.add('show');
});

// Lobby / matchmaking mode buttons (shared [data-m] selector)
document.querySelectorAll('[data-m]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('[data-m]').forEach(b => b.classList.remove('sel'));
    btn.classList.add('sel');
    lobbyModeSelected = btn.dataset.m;
    mmMode = btn.dataset.m;
  });
});

document.getElementById('btn-quick-match').addEventListener('click', startMatchmaking);
document.getElementById('btn-cancel-mm').addEventListener('click', cancelMatchmaking);
document.getElementById('btn-create-lobby').addEventListener('click', createLobby);
document.getElementById('btn-join-lobby').addEventListener('click', joinByCode);
document.getElementById('btn-lobby-back').addEventListener('click', () => {
  document.getElementById('lobby-screen').classList.remove('show');
  document.getElementById('menu').classList.add('show');
});

// In-lobby
document.getElementById('btn-ready').addEventListener('click', toggleReady);
document.getElementById('btn-leave-lobby').addEventListener('click', leaveLobby);
document.querySelector('.code-banner').addEventListener('click', () => {
  const code = document.getElementById('lobby-code-disp').textContent;
  navigator.clipboard.writeText(code).catch(()=>{});
  document.querySelector('.code-banner .label').textContent = 'COPIED!';
  setTimeout(() => { document.querySelector('.code-banner .label').textContent = 'LOBBY CODE — share with friends'; }, 1500);
});

// Sign out
document.getElementById('btn-signout')?.addEventListener('click', async () => {
  await sb.auth.signOut();
  cleanupOnline();
  document.getElementById('lobby-screen').classList.remove('show');
  document.getElementById('menu').classList.add('show');
});

// ─────────────────────────────────────────────────────────────────────────────
loadKeybinds();
requestAnimationFrame(loop);
